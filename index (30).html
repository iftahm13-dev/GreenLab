<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenLab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a2218;font-size:14px}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c8d4c0;border-radius:10px}
/* ── Design tokens ── */
:root{
  --sb-w:220px;
  --sb-bg:linear-gradient(170deg,#163026 0%,#1e4035 60%,#22503f 100%);
  --sb-act:#2d6a54;--sb-act-text:#6ee7b7;
  --fo:#163026;--fo2:#1e4035;--fo3:#3a7358;
  --lf:#22c55e;--lf2:#86efac;--lf3:#dcfce7;
  --acc:#34d399;
  --bg:#f0f2f5;--bg2:#e8eaed;--bg3:#fff;
  --card:#ffffff;--card-border:#e5e7eb;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 2px 8px rgba(0,0,0,.10),0 8px 32px rgba(0,0,0,.08);
  --shg:0 12px 40px rgba(22,48,38,.22);
  --r:8px;--r2:12px;--r3:16px;--r4:20px;
  --to:#dc2626;--td:#fef2f2;
  --am:#d97706;--ad:#fffbeb;
  --bo:#e5e7eb;--b2:#d1d5db;
  --i1:#111827;--i2:#1f2937;--i3:#374151;--i4:#6b7280;--i5:#9ca3af;
  --ll:#f0fdf4;--ld:#86efac;
  --cr:#f9fafb;--cr2:#f3f4f6;--pp:#ffffff;--cv:#e8eaed;
}
/* ── Scrollbar in sidebar ── */
.sb ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* ═══════════════════════════════════
   SIDEBAR — dark green gradient, full height
═══════════════════════════════════ */
.hdr{display:none}/* header replaced by sidebar */
.app{display:flex;flex:1;min-height:0;overflow:hidden;height:100vh}
.sb{
  width:var(--sb-w);flex-shrink:0;
  background:var(--sb-bg);
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
  box-shadow:4px 0 24px rgba(0,0,0,.12);
  z-index:100;
}
/* Sidebar logo area */
.sb-logo{
  padding:24px 20px 20px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.08);
  margin-bottom:8px;
}
.sb-logo-ic{
  width:36px;height:36px;background:var(--lf);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 8px rgba(34,197,94,.35);flex-shrink:0;
}
.sb-logo-txt{font-family:'Lora',serif;font-size:17px;color:#fff;font-weight:500}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;margin-top:1px}
/* Sidebar lab chip */
.sb-lab{
  margin:0 12px 16px;padding:8px 11px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r2);display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:background .15s;
}
.sb-lab:hover{background:rgba(255,255,255,.12)}
.sb-lab-dot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0;box-shadow:0 0 6px var(--lf)}
.sb-lab-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-lab-arrow{font-size:9px;color:rgba(255,255,255,.35)}
/* Sidebar nav section */
.sb-nav{flex:1;overflow-y:auto;padding:0 10px}
.sb-section-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 10px;margin:16px 0 6px}
/* Nav buttons */
.nav-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 12px;
  border-radius:var(--r2);border:none;background:none;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  color:rgba(255,255,255,.55);cursor:pointer;
  transition:all .15s;text-align:left;margin-bottom:2px;
}
.nav-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.nav-btn.on{
  background:var(--sb-act);color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.nav-btn.on .nav-icon{color:var(--sb-act-text)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-label{flex:1}
/* Sidebar greenhouse list */
.sb-top{padding:0 12px 6px;flex-shrink:0}
.sb-sc{flex:1;min-height:0;overflow-y:auto;padding:0 10px 16px}
.slbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px;padding:0 2px}
.ghi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .13s;margin-bottom:2px}
.ghi:hover{background:rgba(255,255,255,.08)}
.ghi.on{background:var(--sb-act);border-color:rgba(255,255,255,.12)}
.ghi.on .ghnm{color:#fff}
.ghi.on .ghmeta{color:rgba(255,255,255,.5)}
.ghi.spray .ghdot{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.25);animation:pw 2s infinite}
.ghdot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0}
.ghi.on .ghdot{background:var(--lf2);box-shadow:0 0 6px var(--lf)}
.ghinfo{flex:1;min-width:0}
.ghnm{font-size:12px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghmeta{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px;font-family:'DM Mono',monospace}
.ghdel{opacity:0;background:none;border:none;cursor:pointer;color:rgba(255,100,100,.6);font-size:12px;padding:2px 4px;border-radius:4px}
.ghi:hover .ghdel{opacity:1}
/* Sidebar bottom section */
.sb-bottom{flex-shrink:0;padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--r);cursor:pointer;transition:background .13s}
.sb-user:hover{background:rgba(255,255,255,.08)}
.sb-user-name{font-size:12px;font-weight:500;color:rgba(255,255,255,.75);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;border:2px solid rgba(255,255,255,.2);flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}
/* Sidebar properties panel (greenhouse/table settings) */
.pg{margin-bottom:16px}
.pgt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.pr{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pla{font-size:11px;color:rgba(255,255,255,.5);width:48px;flex-shrink:0}
.pi{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);color:#fff;font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;outline:none;width:100%}
.pi:focus{border-color:var(--lf);background:rgba(255,255,255,.12);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.piu{display:flex;align-items:center;flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);overflow:hidden}
.piu input{flex:1;background:none;border:none;color:#fff;font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;outline:none;width:100%}
.piu:focus-within{border-color:var(--lf);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.pu{font-size:9px;color:rgba(255,255,255,.35);padding-right:7px;font-family:'DM Mono',monospace}
.pta{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);color:rgba(255,255,255,.85);font-family:'Inter',sans-serif;font-size:11px;padding:6px 8px;outline:none;resize:vertical;line-height:1.5}
.pta:focus{border-color:var(--lf);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.sc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.scard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:8px 10px}
.sv{font-size:20px;font-weight:700;color:#fff;line-height:1}
.sk{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}
.tli{display:flex;align-items:center;padding:7px 9px;border-radius:var(--r);cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);font-size:11px;margin-bottom:3px;color:rgba(255,255,255,.65)}
.tli:hover,.tli.on{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff}
.eli{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--r);border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);font-size:11px;margin-bottom:3px;transition:border-color .12s;color:rgba(255,255,255,.65)}
.eli:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.1)}
.eli-acts{display:none;gap:3px;flex-shrink:0}
.eli:hover .eli-acts{display:flex}
.eli-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif}
.eli-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.eli-btn.del{color:#fca5a5;border-color:rgba(252,165,165,.3)}
.eli-btn.del:hover{background:rgba(220,38,38,.2)}

/* ═══════════════════════════════════
   SPRAY WARNING BAR
═══════════════════════════════════ */
.swarn{flex-shrink:0;background:linear-gradient(90deg,#7c1d1d,#991b1b);padding:8px 20px;display:flex;align-items:center;gap:10px;animation:pw 2.5s ease-in-out infinite}
@keyframes pw{0%,100%{opacity:1}50%{opacity:.88}}

/* ═══════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════ */
.main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
/* Top toolbar */
.toolbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-bottom:1px solid var(--bo);
  background:#fff;min-height:52px;flex-wrap:wrap;
  box-shadow:0 1px 0 var(--bo);
}
.tsep{width:1px;height:20px;background:var(--bo);flex-shrink:0}
/* Top-bar right side (sync chip, share, lock, user) */
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.hbadge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--bo);color:var(--i4);background:var(--cr2)}
.lkbtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--i3);padding:5px 12px;border-radius:20px;border:1px solid var(--bo);cursor:pointer;background:#fff;font-family:'Inter',sans-serif;transition:all .13s}
.lkbtn:hover{background:var(--cr2);border-color:var(--b2)}
.lkbtn.edit{color:var(--am);border-color:#fcd34d;background:#fffbeb}
/* Lab chip in toolbar */
.lab-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--ll);font-size:11px;color:var(--fo2);font-weight:600;cursor:pointer;border:1px solid var(--ld);transition:all .13s}
.lab-chip:hover{background:#dcfce7;border-color:var(--lf)}
.lab-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0;box-shadow:0 0 5px var(--lf)}
.enote{font-size:11px;font-weight:600;color:var(--am);padding:5px 11px;background:#fffbeb;border:1px solid #fcd34d;border-radius:20px}
.tenote{font-size:11px;font-weight:600;color:#1d4ed8;padding:5px 11px;background:#eff6ff;border:1px solid #93c5fd;border-radius:20px}
.tmeta{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;margin-left:auto}
.zbtn{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--bo);background:#fff;color:var(--i3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.zbtn:hover{background:var(--cr2)}
.zval{font-family:'DM Mono',monospace;font-size:10px;color:var(--i4);min-width:34px;text-align:center}
.selbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bo);background:#fff;color:var(--i3);font-family:'Inter',sans-serif;transition:all .13s}
.selbtn.on{background:var(--ll);border-color:var(--ld);color:var(--fo2);font-weight:600}

/* ═══════════════════════════════════
   CANVAS / LAYOUT VIEW
═══════════════════════════════════ */
.cvp{flex:1;min-height:0;overflow:hidden;background:#e8eaed;background-image:radial-gradient(circle,#c8cdd4 1px,transparent 1px);background-size:20px 20px;position:relative}
.cvp.panning{cursor:grabbing!important}
.cvp.space-mode{cursor:grab}
.cvw{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.ghr{position:absolute;top:0;left:0;background:#fff;border:1.5px solid #d1d5db;border-radius:12px;box-shadow:var(--sh);overflow:visible}
.rgrid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(#f3f4f6 1px,transparent 1px),linear-gradient(90deg,#f3f4f6 1px,transparent 1px);background-size:40px 40px;border-radius:12px}
.rlabel{position:absolute;top:10px;left:14px;font-family:'Lora',serif;font-size:12px;color:var(--i4);pointer-events:none;font-weight:500}
.cvhint{position:absolute;bottom:14px;right:14px;background:rgba(255,255,255,.92);border:1px solid var(--bo);border-radius:var(--r2);padding:7px 12px;font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;line-height:1.8;pointer-events:none;z-index:10;box-shadow:var(--sh)}
/* Struct objects */
.sobj{position:absolute;display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none}
.sobj:hover{z-index:50}
.sobj.dragging{cursor:grabbing;z-index:200;opacity:.9}
.sobj.locked{cursor:default}
/* Table blocks */
.tbl{position:absolute;background:rgba(255,255,255,.95);border:1.5px solid #d1fae5;border-radius:10px;display:flex;flex-direction:column;overflow:visible;transition:border-color .15s;box-shadow:var(--sh)}
.tbl:hover{border-color:#6ee7b7}
.tbl.sel{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.14),var(--sh)}
.tbl.tedit{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18)}
.tbl.dragging{box-shadow:var(--sh2);opacity:.93;z-index:200;cursor:grabbing!important}
.tbl.locked .thd{cursor:default}
.thd{flex-shrink:0;background:linear-gradient(135deg,#d1fae5,#a7f3d0);padding:5px 10px;display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;border-radius:8px 8px 0 0}
.tbl.tedit .thd{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.thnm{font-size:9px;font-weight:700;color:#065f46;letter-spacing:.06em;font-family:'DM Mono',monospace}
.thinfo{font-size:8px;color:#059669;font-family:'DM Mono',monospace}
.thedit{font-size:10px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);color:#1d4ed8;border-radius:20px;padding:3px 10px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;white-space:nowrap;transition:all .12s}
.thedit:hover{background:rgba(59,130,246,.25)}
.pgrid{flex:1;display:grid;padding:5px;overflow:visible;align-items:center;justify-items:center}
/* Pot cells */
.pcw{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;position:relative;user-select:none}
.pcw:hover{z-index:10}
.pcw:hover .psvg{transform:scale(1.1)}
.pcw.active .psvg{transform:scale(1.06)}
.pcw.temode{cursor:default}
.pcw.temode:hover .psvg{transform:none}
.pcw.temode:hover .pdel{display:flex}
.pcw.sel-mode{cursor:cell}
.pcw.pot-sel{outline:2.5px solid #059669;outline-offset:3px;border-radius:6px;background:rgba(5,150,105,.1);z-index:15}
.pcw.pot-sel .psvg{transform:scale(1.06)}
.pcw.pot-sel .plbl{background:rgba(167,243,208,.7);color:#065f46}
.psvg{transition:transform .1s;display:block}
.plbl{display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:700;color:#111827;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:none;background:rgba(255,255,255,.92);border-radius:4px;padding:0 4px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex-shrink:0}
.pslot{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:default}
.pslot.addmode{cursor:pointer}
.pdel{display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--to);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;align-items:center;justify-content:center;z-index:30;font-weight:700;line-height:1}
.eov{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5}
/* Selection banner */
.ssel{display:flex;align-items:center;gap:10px;padding:8px 20px;background:var(--fo);color:#fff;font-size:12px;flex-shrink:0}
.ssel strong{color:var(--lf2)}
/* Status bar */
.sbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:5px 20px;border-top:1px solid var(--bo);background:#fff}
.si{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:4px}
.si strong{color:var(--i2)}
.sidot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════════════════
   POT POPUP (float panel)
═══════════════════════════════════ */
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop{position:fixed;z-index:700;background:#fff;border:1px solid var(--bo);border-radius:var(--r3);box-shadow:var(--sh2);width:316px;animation:pop .15s ease;display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
.pph{padding:12px 14px 10px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;background:#f9fafb;border-radius:var(--r3) var(--r3) 0 0}
.pppre{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pptit{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--i1)}
.ppsub{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;margin-top:2px}
.ppx{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--i4);font-size:18px;padding:0 2px;line-height:1;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.ppx:hover{color:var(--i1);background:var(--cr2)}
.ppb{padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;min-height:0}
.ppf{padding:10px 14px;border-top:1px solid var(--bo);display:flex;align-items:center;gap:7px;flex-shrink:0;background:#f9fafb}
.fl{display:block;font-size:11px;font-weight:600;color:var(--i3);margin-bottom:4px}
.fi{width:100%;background:#fff;border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-family:'DM Mono',monospace;font-size:13px;padding:7px 10px;outline:none;transition:border-color .12s}
.fi:focus{border-color:var(--lf);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.fi.big{font-size:14px;font-weight:600}
.fta{width:100%;background:#fff;border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-family:'Inter',sans-serif;font-size:12px;padding:7px 10px;outline:none;resize:none;line-height:1.5;transition:border-color .12s}
.fta:focus{border-color:var(--lf);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid var(--bo);color:var(--i4);font-weight:500;transition:all .12s}

.ph{background:#f0fdf4;border-color:#86efac;color:#166534}
.pw{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.pd{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.stylgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stopt{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 3px;border-radius:var(--r);cursor:pointer;border:1.5px solid var(--bo);background:#fff;transition:all .12s}
.stopt:hover{border-color:var(--ld)}
.stopt.on{border-color:#059669;background:#f0fdf4}
.stopt-lbl{font-size:8px;color:var(--i4);font-family:'DM Mono',monospace;text-align:center}
.imgup{width:100%;height:76px;background:var(--cr2);border:1.5px dashed var(--b2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:3px;overflow:hidden;position:relative;transition:all .12s}
.imgup:hover{border-color:var(--lf);background:#f0fdf4}
.imgup img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.iuph{font-size:11px;color:var(--i4);text-align:center;line-height:1.4;pointer-events:none}
.imgrm{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.exsel{display:flex;flex-direction:column;gap:3px;max-height:96px;overflow-y:auto}
.exsopt{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bo);background:#fff;font-size:11px;transition:all .12s}
.exsopt:hover{border-color:var(--ld)}
.exsopt.on{border-color:#059669;background:#f0fdf4}

/* ═══════════════════════════════════
   PLANTS / SEARCH VIEW
═══════════════════════════════════ */
.sv2{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.svh{flex-shrink:0;padding:16px 20px 12px;border-bottom:1px solid var(--bo);background:#fff}
.svtit{font-family:'Lora',serif;font-size:20px;color:var(--i1);margin-bottom:10px;font-weight:500}
.svbox{flex:1;display:flex;align-items:center;gap:8px;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r2);padding:8px 12px;transition:all .12s}
.svbox:focus-within{border-color:var(--lf);background:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.svinp{flex:1;background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--i1)}
.svinp::placeholder{color:var(--i5)}
.svcnt{font-family:'DM Mono',monospace;font-size:10px;color:var(--i4);white-space:nowrap}
.svfil{flex-shrink:0;display:flex;gap:5px;flex-wrap:wrap;padding:8px 20px;border-bottom:1px solid var(--bo);background:#fff}
.fc{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--bo);color:var(--i3);background:#fff;font-weight:500;transition:all .12s}
.fc:hover{border-color:#059669;color:#059669}
.fc.on{background:#f0fdf4;border-color:#86efac;color:#166534;font-weight:600}
.svlist{flex:1;min-height:0;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:6px}
.rc{display:flex;align-items:center;gap:11px;padding:11px 14px;background:#fff;border:1px solid var(--bo);border-radius:var(--r3);cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.rc:hover{border-color:#86efac;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.rcinfo{flex:1;min-width:0}
.rcgen{font-size:13px;font-weight:600;color:var(--i1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcpath{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;margin-top:2px}
.rcst{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.rcst.healthy{background:#f0fdf4;color:#166534}
.rcst.wilting{background:#fffbeb;color:#92400e}
.rcst.dead{background:#fef2f2;color:#991b1b}
.rcst.empty{background:var(--cr2);color:var(--i4)}

/* ═══════════════════════════════════
   TEAM PAGE
═══════════════════════════════════ */
.tpage{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.tphead{flex-shrink:0;padding:16px 20px;border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:space-between;background:#fff}
.tptit{font-family:'Lora',serif;font-size:20px;color:var(--i1);font-weight:500}
.tlist{flex:1;min-height:0;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.mcard{background:#fff;border:1px solid var(--bo);border-radius:var(--r3);padding:14px 16px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);transition:all .13s}
.mcard:hover{border-color:#86efac;box-shadow:0 4px 12px rgba(0,0,0,.09)}
.mav{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;overflow:hidden}
.mav img{width:100%;height:100%;object-fit:cover}
.minfo{flex:1;min-width:0}
.mnm{font-size:14px;font-weight:600;color:var(--i1)}
.mem{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;margin-top:2px}
.mpos{font-size:11px;color:#059669;font-weight:600;margin-top:3px}
.medbtn{background:#fff;border:1.5px solid var(--bo);color:var(--i3);border-radius:20px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .12s}
.medbtn:hover{background:var(--cr2);border-color:var(--b2)}

/* ═══════════════════════════════════
   MODAL
═══════════════════════════════════ */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes mi{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mov{position:fixed;inset:0;background:rgba(17,24,39,.45);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fi .15s ease}
.mo{background:#fff;border:1px solid var(--bo);border-radius:var(--r4);padding:24px;width:390px;max-width:93vw;box-shadow:var(--shg);animation:mi .18s ease}
.mo.wide{width:460px}
.motit{font-family:'Lora',serif;font-size:18px;margin-bottom:3px;color:var(--i1);font-weight:500}
.mosub{font-size:12px;color:var(--i4);margin-bottom:18px;line-height:1.5}
.mof{margin-bottom:12px}
.mol{display:block;font-size:11px;font-weight:600;color:var(--i3);margin-bottom:4px}
.moi{width:100%;background:#fff;border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;outline:none;transition:all .12s}
.moi:focus{border-color:var(--lf);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.mota{width:100%;background:#fff;border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-family:'Inter',sans-serif;font-size:12px;padding:8px 10px;outline:none;resize:none;line-height:1.5;transition:all .12s}
.mota:focus{border-color:var(--lf);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.mosel{width:100%;background:#fff;border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-family:'Inter',sans-serif;font-size:12px;padding:8px 10px;outline:none;cursor:pointer}
.morow{display:flex;gap:12px}
.morow .mof{flex:1}
.moacts{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.monote{font-size:11px;color:var(--i4);margin-top:4px;line-height:1.5}
.ulkw{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);padding:10px 12px;font-size:12px;color:#92400e;line-height:1.5;margin-top:4px}

/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;padding:7px 16px;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .13s}
.btnp{background:#059669;color:#fff;border-color:#059669;box-shadow:0 1px 4px rgba(5,150,105,.3)}
.btnp:hover{background:#047857;border-color:#047857;box-shadow:0 2px 8px rgba(5,150,105,.4)}
.btns{background:#fff;color:var(--i2);border-color:var(--bo);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.btns:hover{background:var(--cr2);border-color:var(--b2)}
.btng{background:transparent;color:var(--i3);border-color:transparent}
.btng:hover{background:var(--cr2)}
.btnd{background:transparent;color:var(--to);border-color:#fca5a5}
.btnd:hover{background:#fef2f2}
.btnw{width:100%;justify-content:center}
.bsm{padding:5px 12px;font-size:11px}
.bxs{padding:3px 9px;font-size:11px}
.bamb{background:#b45309;color:#fef3c7;border-color:#b45309}
.bamb:hover{background:#92400e}

/* ═══════════════════════════════════
   STOCK TAB
═══════════════════════════════════ */
.stk{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.stk-head{flex-shrink:0;padding:16px 20px;border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:space-between;background:#fff}
.stk-tit{font-family:'Lora',serif;font-size:20px;color:var(--i1);font-weight:500}
.stk-list{flex:1;min-height:0;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.stk-item{background:#fff;border:1px solid var(--bo);border-radius:var(--r3);padding:12px 14px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--sh);transition:all .13s}
.stk-item:hover{border-color:#86efac;box-shadow:0 4px 12px rgba(0,0,0,.09)}
.stk-img{width:88px;height:88px;border-radius:var(--r2);object-fit:cover;flex-shrink:0;border:1.5px solid var(--bo);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--cr2);font-size:32px;overflow:hidden}
.stk-img img{width:100%;height:100%;object-fit:cover}
.stk-nm{font-size:13px;font-weight:600;color:var(--i1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stk-cat{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px}
.stk-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stk-qbtn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--bo);background:#fff;color:var(--i2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .12s}
.stk-qbtn:hover{background:#f0fdf4;border-color:#86efac}
.stk-qval{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--i1);min-width:30px;text-align:center}
.stk-del{background:none;border:1.5px solid #fca5a5;color:var(--to);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600;transition:all .12s}
.stk-del:hover{background:#fef2f2}
.stk-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;gap:10px;color:var(--i4)}

/* ═══════════════════════════════════
   DASHBOARD
═══════════════════════════════════ */
.dash-page{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.dash-head{flex-shrink:0;padding:16px 20px;border-bottom:1px solid var(--bo);background:#fff}
.dash-tit{font-family:'Lora',serif;font-size:20px;color:var(--i1);margin-bottom:0;font-weight:500}
.dash-body{flex:1;min-height:0;overflow-y:auto;padding:20px;display:flex;flex-wrap:wrap;gap:20px;align-content:flex-start}
.widget-card{background:#fff;border:1px solid var(--bo);border-radius:var(--r4);padding:22px;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:260px;box-shadow:var(--sh)}
.widget-card h3{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--i3);text-align:center;text-transform:uppercase;letter-spacing:.06em}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.donut-val{font-size:22px;font-weight:700;color:#059669;line-height:1;font-family:'Lora',serif}
.donut-sub{font-size:10px;color:var(--i4);font-family:'DM Mono',monospace;margin-top:3px}
.donut-legend{display:flex;flex-direction:column;gap:6px;width:100%}
.dl-row{display:flex;align-items:center;gap:8px;font-size:11px}
.dl-dot{width:10px;height:10px;border-radius:4px;flex-shrink:0}
.dl-label{color:var(--i3);flex:1}
.dl-val{font-family:'DM Mono',monospace;color:var(--i2);font-weight:600}

/* ═══════════════════════════════════
   SYNC STATUS
═══════════════════════════════════ */
.sync-chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;cursor:default;transition:all .3s;flex-shrink:0;border:1.5px solid transparent}
.sync-chip.saving{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.sync-chip.saved{background:#f0fdf4;border-color:#86efac;color:#166534}
.sync-chip.error{background:#fef2f2;border-color:#fca5a5;color:#991b1b;cursor:pointer}
.sync-chip.nosync{background:var(--cr2);border-color:var(--bo);color:var(--i4)}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sync-dot.saving{background:#f59e0b;animation:pulse-dot 1s ease-in-out infinite}
.sync-dot.saved{background:#22c55e}
.sync-dot.error{background:#ef4444;animation:pulse-dot .6s ease-in-out infinite}
.sync-dot.nosync{background:var(--i5)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════════════════════════
   FIREBASE PANEL
═══════════════════════════════════ */
.fb-panel{position:fixed;inset:0;background:rgba(17,24,39,.55);backdrop-filter:blur(8px);z-index:1500;display:flex;align-items:center;justify-content:center}
.fb-card{background:#fff;border:1px solid var(--bo);border-radius:var(--r4);padding:28px;width:520px;max-width:93vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shg);animation:mi .18s ease}
.fb-card h2{font-family:'Lora',serif;font-size:19px;color:var(--i1);margin-bottom:4px;font-weight:500}
.fb-card .sub{font-size:12px;color:var(--i4);margin-bottom:18px;line-height:1.5}
.fb-section{margin-bottom:18px}
.fb-section h3{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--i4);margin-bottom:8px}
.fb-status-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:6px}
.fb-status-row.local{background:#fffbeb;border:1px solid #fcd34d}
.fb-status-row.firebase{background:#f0fdf4;border:1px solid #86efac}
.fb-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;flex-shrink:0}
.fb-tag.local{background:#fef3c7;color:#92400e}
.fb-tag.firebase{background:#dcfce7;color:#166534}
.code-block{background:#0f172a;border-radius:var(--r2);padding:12px 14px;font-family:'DM Mono',monospace;font-size:10px;color:#7dd3a8;line-height:1.7;margin-top:7px;overflow-x:auto;white-space:pre}
.fb-steps{list-style:none;display:flex;flex-direction:column;gap:8px}
.fb-steps li{display:flex;gap:10px;font-size:12px;color:var(--i2);line-height:1.5}
.fb-steps li::before{content:attr(data-n);width:22px;height:22px;border-radius:50%;background:#059669;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.activity-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bo);font-size:11px;color:var(--i3)}
.activity-row:last-child{border-bottom:none}
.activity-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}

/* ═══════════════════════════════════
   LAB SELECTION SCREEN
═══════════════════════════════════ */
.lab-screen{position:fixed;inset:0;background:var(--sb-bg);display:flex;align-items:center;justify-content:center;z-index:3000}
.lab-card{background:#fff;border-radius:var(--r4);padding:36px;width:400px;max-width:93vw;box-shadow:var(--shg);animation:mi .2s ease}
.lab-tag{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:#f0fdf4;color:#166534;border:1px solid #86efac;margin-bottom:12px;font-family:'DM Mono',monospace}
.lab-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r2);border:1.5px solid var(--bo);background:#fff;cursor:pointer;transition:all .15s;margin-bottom:6px}
.lab-item:hover{border-color:#86efac;background:#f9fafb;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.lab-item.on{border-color:#059669;background:#f0fdf4}
.lab-ic{width:40px;height:40px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#059669;box-shadow:0 2px 6px rgba(5,150,105,.3)}
.lab-nm{font-size:14px;font-weight:600;color:var(--i1)}
.lab-meta{font-size:10px;color:var(--i4);margin-top:2px;font-family:'DM Mono',monospace}
.lab-item-wrap{position:relative;margin-bottom:6px}
.lab-settings-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:1.5px solid var(--bo);color:var(--i4);border-radius:20px;padding:3px 10px;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;z-index:2;transition:all .12s}
.lab-settings-btn:hover{background:var(--cr2);border-color:var(--b2);color:var(--i2)}
.lab-settings-panel{background:var(--cr2);border:1px solid var(--bo);border-radius:var(--r2);padding:16px;margin-bottom:8px}
.lsp-title{font-size:11px;font-weight:700;color:#059669;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.del-warn{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--r);padding:11px 13px;font-size:12px;color:#991b1b;line-height:1.5;margin-bottom:14px}
.pw-err{font-size:11px;color:var(--to);margin-top:4px;font-weight:600}
.pw-ok{font-size:11px;color:#059669;margin-top:4px;font-weight:600}

/* ═══════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════ */
.lsc{position:fixed;inset:0;background:var(--sb-bg);display:flex;align-items:center;justify-content:center;z-index:2000}
.lcard{background:#fff;border-radius:var(--r4);padding:36px;width:360px;box-shadow:var(--shg);animation:mi .2s ease}
.llogt{font-family:'Lora',serif;font-size:22px;color:var(--i1);margin-bottom:3px;font-weight:500}
.lsub{font-size:12px;color:var(--i4);margin-bottom:22px;line-height:1.5}
.lmems{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.lmem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);border:1.5px solid var(--bo);background:#fff;cursor:pointer;transition:all .13s}
.lmem:hover{border-color:#86efac;background:#f0fdf4;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.lav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;overflow:hidden}
.lav img{width:100%;height:100%;object-fit:cover}
.ldiv{display:flex;align-items:center;gap:10px;margin:10px 0;color:var(--i5);font-size:11px}
.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--bo)}

/* ═══════════════════════════════════
   MISC
═══════════════════════════════════ */
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.csw:hover{transform:scale(1.15)}
.csw.on{border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.2)}
