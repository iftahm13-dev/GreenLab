<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenLab</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,textarea,select,button{font-family:inherit}
html,body{height:100%}
body{font-family:'Poppins','Inter',sans-serif;background:#F9FAFB;color:#333333;font-size:14px}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:10px}

/* ── Design tokens ── */
:root{
  --sb-w:260px;
  --sb-bg:#ffffff;
  --sb-act:#78C043;--sb-act-text:#ffffff;
  --fo:#2d6a1f;--fo2:#3a7d28;--fo3:#4a9a32;
  --lf:#78C043;--lf2:#a8d878;--lf3:#edf7e3;
  --acc:#78C043;
  --bg:#F9FAFB;--bg2:#F3F4F6;--bg3:#fff;
  --card:#ffffff;--card-border:#E5E7EB;
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --sh2:0 4px 16px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.05);
  --shg:0 10px 25px -5px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --sh-card:0 10px 25px -5px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.03);
  --r:12px;--r2:16px;--r3:20px;--r4:24px;
  --to:#dc2626;--td:#fef2f2;
  --am:#d97706;--ad:#fffbeb;
  --bo:#E5E7EB;--b2:#D1D5DB;
  --i1:#333333;--i2:#374151;--i3:#4B5563;--i4:#6B7280;--i5:#9CA3AF;
  --ll:#edf7e3;--ld:#c3e6a8;
  --cr:#F9FAFB;--cr2:#F3F4F6;--pp:#ffffff;--cv:#e8eaed;
  --c-carb:#78C043;--c-prot:#FFB74D;--c-fat:#FF8A65;
}

/* ── Scrollbar in sidebar ── */
.sb ::-webkit-scrollbar-thumb{background:#D1D5DB}

/* ═══════════════════════════════════
   SIDEBAR — light, clean, reference-style
═══════════════════════════════════ */
.hdr{display:none}
.app{display:flex;flex:1;min-height:0;overflow:hidden;height:100vh}
.sb{
  width:var(--sb-w);flex-shrink:0;
  background:#fff;
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
  border-right:1px solid #EBEBEB;
  z-index:100;
}

/* Sidebar logo area */
.sb-logo{
  padding:24px 20px 20px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  border-bottom:none;
  margin-bottom:4px;
}
.sb-logo-ic{
  width:40px;height:40px;background:transparent;border-radius:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:none;flex-shrink:0;
}
.sb-logo-txt{font-size:16px;color:#333333;font-weight:700;letter-spacing:-.01em;font-family:'Poppins',sans-serif}
.sb-logo-sub{font-size:9px;color:var(--i5);margin-top:1px}

/* Sidebar lab chip */
.sb-lab{
  margin:8px 14px 4px;padding:9px 13px;
  background:#edf7e3;border:1px solid #c3e6a8;
  border-radius:50px;display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:all .15s;
}
.sb-lab:hover{background:#dff0ce;border-color:#a8d878}
.sb-lab-dot{width:7px;height:7px;border-radius:50%;background:#78C043;flex-shrink:0;box-shadow:0 0 0 2px rgba(120,192,67,.2)}
.sb-lab-name{font-size:11px;font-weight:600;color:#3a7d28;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-lab-arrow{font-size:10px;color:var(--i4)}

/* Sidebar section labels */
.sb-section-lbl{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--i5);padding:0 20px;margin:14px 0 4px;
}

/* Nav buttons — reference style */
.sb-nav{display:none}
.nav-btn{
  display:flex;align-items:center;gap:13px;
  width:100%;padding:10px 14px;
  border-radius:50px;border:none;background:none;
  font-size:13px;font-weight:500;
  color:#6B7280;cursor:pointer;
  transition:all .18s;text-align:left;margin-bottom:2px;
  font-family:'Poppins',sans-serif;
}
.nav-btn:hover{background:#F5F5F5;color:#333333}
.nav-btn.on{
  background:#78C043;color:#fff;
  box-shadow:0 6px 18px rgba(120,192,67,.35);
}
.nav-btn.on .nav-icon{background:rgba(255,255,255,.22);color:#fff}
.nav-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:#F3F4F6;
  transition:all .18s;
}
.nav-btn:hover:not(.on) .nav-icon{background:#EBEBEB}
.nav-label{flex:1;font-size:13px;font-weight:500}
/* Bottom settings items in sidebar */
.sb-nav-bottom{padding:4px 16px 8px;flex-shrink:0;border-top:1px solid #F5F5F5}

/* Sidebar greenhouse list */
.sb-top{padding:0 12px 6px;flex-shrink:0}
.sb-sc{flex:1;min-height:0;overflow-y:auto;padding:0 10px 16px}
.slbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--i5);margin-bottom:6px;padding:0 4px}
.ghi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .13s;margin-bottom:2px}
.ghi:hover{background:var(--cr2)}
.ghi.on{background:#edf7e3;border-color:#c3e6a8}
.ghi.on .ghnm{color:#3a7d28;font-weight:600}
.ghi.on .ghmeta{color:#4a9a32}
.ghi.spray .ghdot{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.2);animation:pw 2s infinite}
.ghdot{width:8px;height:8px;border-radius:50%;background:#78C043;flex-shrink:0}
.ghi.on .ghdot{background:#78C043}
.ghinfo{flex:1;min-width:0}
.ghnm{font-size:12px;font-weight:500;color:var(--i2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghmeta{font-size:9px;color:var(--i5);margin-top:1px}
.ghdel{opacity:0;background:none;border:none;cursor:pointer;color:var(--to);font-size:12px;padding:2px 4px;border-radius:4px}
.ghi:hover .ghdel{opacity:1}

/* Sidebar bottom */
.sb-bottom{flex-shrink:0;padding:10px 16px 20px;border-top:1px solid #F0F0F0}
.sb-setting-btn{display:none;
  display:flex;align-items:center;gap:13px;
  width:100%;padding:10px 14px;
  border-radius:50px;border:none;background:none;
  font-size:13px;font-weight:500;
  color:#6B7280;cursor:pointer;
  transition:all .18s;text-align:left;margin-bottom:2px;
  font-family:'Poppins',sans-serif;
}
.sb-setting-btn:hover{background:#F5F5F5;color:#333333}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;cursor:pointer;transition:all .13s}
.sb-user:hover{background:#F3F4F6}
.sb-user-name{font-size:12px;font-weight:600;color:var(--i2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:10px;color:var(--i5);margin-top:1px}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;border:2px solid var(--bo);flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}

/* Sidebar properties panel */
.pg{margin-bottom:16px}
.pgt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--i5);margin-bottom:8px}
.pr{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pla{font-size:11px;color:var(--i4);width:48px;flex-shrink:0}
.pi{flex:1;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:10px;color:#333333;font-size:11px;padding:5px 8px;outline:none;width:100%}
.pi:focus{border-color:#78C043;background:#fff;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.piu{display:flex;align-items:center;flex:1;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);overflow:hidden}
.piu input{flex:1;background:none;border:none;color:var(--i1);font-size:11px;padding:5px 8px;outline:none;width:100%}
.piu:focus-within{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.pu{font-size:9px;color:var(--i4);padding-right:7px}
.pta{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i2);font-size:11px;padding:6px 8px;outline:none;resize:vertical;line-height:1.5}
.pta:focus{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.sc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.scard{background:var(--cr2);border:1px solid var(--bo);border-radius:var(--r);padding:8px 10px}
.sv{font-size:20px;font-weight:700;color:var(--i1);line-height:1}
.sk{font-size:9px;color:var(--i5);margin-top:2px}
.tli{display:flex;align-items:center;padding:7px 9px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;color:var(--i3)}
.tli:hover,.tli.on{border-color:#c3e6a8;background:#edf7e3;color:#3a7d28}
.eli{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--r);border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;transition:border-color .12s;color:var(--i3)}
.eli:hover{border-color:#c3e6a8;background:#edf7e3}
.eli-acts{display:none;gap:3px;flex-shrink:0}
.eli:hover .eli-acts{display:flex}
.eli-btn{background:var(--cr2);border:1px solid var(--bo);color:var(--i3);border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer}
.eli-btn:hover{background:var(--bg2);color:var(--i1)}
.eli-btn.del{color:var(--to);border-color:#fca5a5}
.eli-btn.del:hover{background:#fef2f2}

/* ═══════════════════════════════════
   SPRAY WARNING BAR
═══════════════════════════════════ */
.swarn{flex-shrink:0;background:linear-gradient(90deg,#7c1d1d,#991b1b);padding:8px 20px;display:flex;align-items:center;gap:10px;animation:pw 2.5s ease-in-out infinite}
@keyframes pw{0%,100%{opacity:1}50%{opacity:.88}}

/* ═══════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════ */
.main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:#F9FAFB;border-left:1px solid #F0F0F0}

/* Top toolbar */
.toolbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 24px;border-bottom:1px solid #F0F0F0;
  background:#fff;min-height:54px;flex-wrap:wrap;
}
.tsep{width:1px;height:20px;background:var(--bo);flex-shrink:0}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.hbadge{font-size:10px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bo);color:var(--i4);background:var(--cr2);font-weight:500}
.lkbtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#4B5563;padding:7px 16px;border-radius:50px;border:1.5px solid #E5E7EB;cursor:pointer;background:#fff;transition:all .13s}
.lkbtn:hover{background:var(--cr2)}
.lkbtn.edit{color:#d97706;border-color:#fcd34d;background:#fffbeb;font-weight:700}
.lab-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--ll);font-size:11px;color:var(--fo2);font-weight:600;cursor:pointer;border:1px solid var(--ld);transition:all .13s}
.lab-chip:hover{background:#dff0ce}
.lab-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0}
.enote{font-size:11px;font-weight:600;color:var(--am);padding:5px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r)}
.tenote{font-size:11px;font-weight:600;color:#1d4ed8;padding:5px 12px;background:#eff6ff;border:1px solid #93c5fd;border-radius:var(--r)}
.tmeta{font-size:10px;color:var(--i4);margin-left:auto}
.zbtn{width:30px;height:30px;border-radius:var(--r);border:1.5px solid var(--bo);background:#fff;color:var(--i3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.zbtn:hover{background:var(--cr2);border-color:var(--b2)}
.zval{font-size:11px;color:var(--i4);min-width:36px;text-align:center}
.selbtn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--bo);background:#fff;color:var(--i3);transition:all .13s}
.selbtn.on{background:#edf7e3;border-color:#c3e6a8;color:#3a7d28;font-weight:600}

/* ═══════════════════════════════════
   CANVAS / LAYOUT VIEW
═══════════════════════════════════ */
.cvp{flex:1;min-height:0;overflow:hidden;background:#F4F6F8;background-image:radial-gradient(circle,#D1D5DB 1px,transparent 1px);background-size:22px 22px;position:relative;touch-action:none;-webkit-user-select:none;user-select:none;cursor:grab}.cvp:active{cursor:grabbing}
.cvp.panning{cursor:grabbing!important}
.cvp.space-mode{cursor:grab}
.cvw{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;touch-action:none}
.ghr{position:absolute;top:0;left:0;background:#fff;border:1.5px solid #e5e7eb;border-radius:16px;box-shadow:var(--sh);overflow:visible}
.rgrid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(#f3f4f6 1px,transparent 1px),linear-gradient(90deg,#f3f4f6 1px,transparent 1px);background-size:40px 40px;border-radius:16px}
.rlabel{position:absolute;top:10px;left:14px;font-size:12px;color:var(--i4);pointer-events:none;font-weight:500}
.cvhint{position:absolute;bottom:14px;right:14px;background:rgba(255,255,255,.95);border:1px solid var(--bo);border-radius:var(--r2);padding:7px 12px;font-size:10px;color:var(--i4);line-height:1.8;pointer-events:none;z-index:10;box-shadow:var(--sh)}
.sobj{position:absolute;display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none}
.sobj:hover{z-index:50}
.sobj.dragging{cursor:grabbing;z-index:200;opacity:.9}
.sobj.locked{cursor:default}

/* Table blocks */
.tbl{position:absolute;background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;display:flex;flex-direction:column;overflow:visible;transition:border-color .15s;box-shadow:var(--sh)}
.tbl:hover{border-color:#c3e6a8;box-shadow:0 4px 16px rgba(120,192,67,.1)}
.tbl.sel{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.25),var(--sh-card);background:#edf7e3}
.tbl.tedit{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.tbl.dragging{box-shadow:var(--sh2);opacity:.93;z-index:200;cursor:grabbing!important}
.tbl.locked .thd{cursor:default}
.thd{flex-shrink:0;background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;border-radius:12px 12px 0 0}
.tbl.tedit .thd{background:#eff6ff;border-bottom-color:#bfdbfe}
.thnm{font-size:10px;font-weight:700;color:var(--i2);letter-spacing:.03em}
.thinfo{font-size:9px;color:var(--i4)}
.thedit{font-size:11px;background:#78C043;border:none;color:#fff;border-radius:50px;padding:5px 14px;cursor:pointer;font-weight:600;white-space:nowrap;transition:all .12s;box-shadow:0 1px 4px rgba(120,192,67,.3)}
.thedit:hover{background:#69ad38;box-shadow:0 2px 8px rgba(120,192,67,.4)}
.pgrid{flex:1;display:grid;padding:5px;overflow:visible;align-items:center;justify-items:center}

/* Pot cells */
.pcw{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;position:relative;user-select:none}
.pcw:hover{z-index:10}
.pcw:hover .psvg{transform:scale(1.1)}
.pcw.active .psvg{transform:scale(1.06)}
.pcw.temode{cursor:default}
.pcw.temode:hover .psvg{transform:none}
.pcw.temode:hover .pdel{display:flex}
.pcw.sel-mode{cursor:cell}
.pcw.pot-sel{outline:2.5px solid #78C043;outline-offset:3px;border-radius:8px;background:rgba(120,192,67,.08);z-index:15}
.pcw.pot-sel .psvg{transform:scale(1.06)}
.pcw.pot-sel .plbl{background:rgba(196,230,168,.8);color:#2d6a1f}
.psvg{transition:transform .1s;display:block}
.plbl{display:flex;align-items:center;justify-content:center;font-weight:600;color:#111827;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:none;background:rgba(255,255,255,.95);border-radius:5px;padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.07);flex-shrink:0;letter-spacing:-0.03em}
.pslot{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:default}
.pslot.addmode{cursor:pointer}
.pdel{display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--to);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;align-items:center;justify-content:center;z-index:30;font-weight:700;line-height:1}
.eov{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5}

/* Selection banner */
.ssel{display:flex;align-items:center;gap:10px;padding:8px 24px;background:#111827;color:#fff;font-size:12px;flex-shrink:0}
.ssel strong{color:#a8d878}

/* Status bar */
.sbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:6px 24px;border-top:1px solid var(--bo);background:#fff}
.si{font-size:10px;color:var(--i4);display:flex;align-items:center;gap:4px}
.si strong{color:var(--i2)}
.sidot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════════════════
   POT POPUP (float panel)
═══════════════════════════════════ */
@keyframes sheet-up{from{transform:translateY(60px);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop{position:fixed;z-index:700;background:#fff;border:1px solid var(--bo);border-radius:var(--r3);box-shadow:var(--sh2);width:316px;animation:pop .15s ease;display:flex;flex-direction:column;max-height:90vh}
.pop-handle{display:none;width:36px;height:4px;background:#D1D5DB;border-radius:2px;margin:10px auto 0;flex-shrink:0}
@media(max-width:1024px){.pop-handle{display:block}}
.pop-handle{display:none;width:36px;height:4px;background:#D1D5DB;border-radius:2px;margin:6px auto 2px;flex-shrink:0}
@media(max-width:1024px){.pop-handle{display:block}}
.pph{padding:10px 14px 8px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;background:#f9fafb;border-radius:var(--r3) var(--r3) 0 0}
.pppre{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pptit{font-size:13px;font-weight:700;color:var(--i1)}
.ppsub{font-size:10px;color:var(--i4);margin-top:2px}
.ppx{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--i4);font-size:18px;padding:0;line-height:1;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.ppx:hover{color:var(--i1);background:var(--cr2)}
.ppb{padding:10px 14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:0}
.ppf{padding:10px 16px;border-top:1px solid var(--bo);display:flex;align-items:center;gap:7px;flex-shrink:0;background:#f9fafb}
.fl{display:block;font-size:11px;font-weight:600;color:var(--i3);margin-bottom:4px}
.fi{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-size:13px;padding:8px 10px;outline:none;transition:border-color .12s}
.fi:focus{border-color:#78C043;background:#fff;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.fi.big{font-size:14px;font-weight:600}

/* ═══════════════════════════════════
   TEAM PAGE
═══════════════════════════════════ */

/* ═══════════════════════════════════
   MODAL
═══════════════════════════════════ */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes mi{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mov{position:fixed;inset:0;background:rgba(17,24,39,.4);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fi .15s ease}
.mo{background:#fff;border:1px solid #F0F0F0;border-radius:20px;padding:20px;width:400px;max-width:96vw;box-shadow:0 10px 25px -5px rgba(0,0,0,.1);animation:mi .18s ease}
.mo.wide{width:460px}
.motit{font-size:18px;margin-bottom:4px;color:var(--i1);font-weight:700}
.mosub{font-size:12px;color:var(--i4);margin-bottom:20px;line-height:1.5}
.mof{margin-bottom:14px}
.mol{display:block;font-size:11px;font-weight:600;color:var(--i3);margin-bottom:5px}
.moi{width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;color:#333333;font-size:13px;padding:9px 14px;outline:none;transition:all .12s}

.morow{display:flex;gap:12px}
.morow .mof{flex:1}
.moacts{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.monote{font-size:11px;color:var(--i4);margin-top:4px;line-height:1.5}
.ulkw{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);padding:10px 12px;font-size:12px;color:#92400e;line-height:1.5;margin-top:4px}

/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */

.btng{background:transparent;color:var(--i3);border-color:transparent}

.btnd{background:transparent;color:var(--to);border-color:#fca5a5}
.btnd:hover{background:#fef2f2}
.btnw{width:100%;justify-content:center}
.bsm{padding:6px 14px;font-size:11px}
.bxs{padding:4px 10px;font-size:11px}
.bamb{background:#b45309;color:#fef3c7;border-color:#b45309}
.bamb:hover{background:#92400e}

/* ═══════════════════════════════════
   STOCK TAB
═══════════════════════════════════ */
.stk{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

.stk-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stk-qbtn{width:28px;height:28px;border-radius:var(--r);border:1.5px solid var(--bo);background:#fff;color:var(--i2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .12s}

/* ═══════════════════════════════════
   DASHBOARD
═══════════════════════════════════ */
.dash-page{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.dash-head{flex-shrink:0;padding:20px 24px;border-bottom:1px solid #F0F0F0;background:#fff}

.donut-val{font-size:22px;font-weight:700;color:#78C043;line-height:1;font-family:'Poppins',sans-serif}

/* ═══════════════════════════════════
   SYNC STATUS
═══════════════════════════════════ */
.sync-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:default;transition:all .3s;flex-shrink:0;border:1.5px solid transparent}
.sync-chip.saving{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.sync-chip.saved{background:#edf7e3;border-color:#c3e6a8;color:#2d6a1f}
.sync-chip.error{background:#fef2f2;border-color:#fca5a5;color:#991b1b;cursor:pointer}
.sync-chip.nosync{background:var(--cr2);border-color:var(--bo);color:var(--i4)}
.sync-chip.synced{background:var(--ll);border-color:var(--ld);color:#166534}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sync-dot.saving{background:#f59e0b;animation:pulse-dot 1s ease-in-out infinite}
.sync-dot.saved,.sync-dot.synced{background:#78C043}
.sync-dot.error{background:#ef4444;animation:pulse-dot .6s ease-in-out infinite}
.sync-dot.nosync{background:var(--i5)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

═══════════════════════════════════ */
.fb-panel{position:fixed;inset:0;background:rgba(17,24,39,.5);backdrop-filter:blur(8px);z-index:1500;display:flex;align-items:center;justify-content:center}

.fb-section{margin-bottom:18px}

.fb-status-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:6px}

═══════════════════════════════════ */

═══════════════════════════════════ */

/* ═══ SICK / PEST ALERT RINGS ════════════════════════
   Visible directly in the greenhouse layout grid.
   Sick  = red-purple pulsing ring + ⚠ badge
   Pests = orange pulsing ring (stronger) + 🐛 badge
══════════════════════════════════════════════════════ */
@keyframes sick-pulse {
  0%,100%{ box-shadow: 0 0 0 2px #a855f7, 0 0 6px 3px rgba(168,85,247,.3); opacity:1; }
  40%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
  50%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
  60%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
}
@keyframes pest-pulse {

var TL_COLORS = {
    genotype:'#78C043', status:'#d97706', experiment:'#3b82f6',
    treatment:'#8b5cf6', note:'#6b7280', moved_in:'#059669',
    date_until:'#0891b2', owner:'#64748b', disease:'#dc2626', pest:'#dc2626'
};
function tlColor(type) { return TL_COLORS[type] || '#6b7280'; }
function tlDiff(oldP, newP, userName, exps) {
    var events = [];
    var d = new Date().toISOString();
    var by = userName || '';
    if ((newP.genotype||'') !== (oldP.genotype||'') && newP.genotype) {
        events.push({ type:'genotype', text:'Genotype set to ' + newP.genotype + (newP.treatment ? ' / ' + newP.treatment : ''), date:d, by:by });
    }
    var newSts = (newP.statuses&&newP.statuses.length ? newP.statuses : (newP.status&&newP.status!=='empty'?[newP.status]:[])).filter(Boolean);
    var oldSts = (oldP.statuses&&oldP.statuses.length ? oldP.statuses : (oldP.status&&oldP.status!=='empty'?[oldP.status]:[])).filter(Boolean);
    if (JSON.stringify(newSts.slice().sort()) !== JSON.stringify(oldSts.slice().sort()) && newSts.length > 0) {
        events.push({ type:'status', text:'Status: '+newSts.join(' + ')+(newP.disease_name?' ('+newP.disease_name+')':'')+(newP.pest_name?' / '+newP.pest_name:''), date:d, by:by });

function SpaceDonut({ used, total, size = 170 }) {
    const free = Math.max(0, total - used);
    const pctUsed = total > 0 ? used / total : 0;
    const pctFree = 1 - pctUsed;
    const freeSqM = (free / 10000).toFixed(1);
    const cx = size / 2, cy = size / 2;
    // Concentric rings helper
    const mkRing = (r, pct, color, sw) => {
        const circ = 2 * Math.PI * r;
        const dash = Math.max(0, pct) * circ;
        const gap  = circ - dash;
        return React.createElement("circle", {
            cx, cy, r, fill: "none", stroke: color, strokeWidth: sw,
            strokeDasharray: dash + " " + gap,
            strokeDashoffset: circ / 4,
            strokeLinecap: "round"
        });
    };
    const rings = [
        { r: 62, pct: pctUsed,  color: '#78C043', sw: 11 },
        { r: 47, pct: Math.min(pctUsed * 1.15, 1), color: '#FFB74D', sw: 11 },
        { r: 32, pct: pctFree,  color: '#FF8A65', sw: 11 },
    ];
    return React.createElement("div", { className: "donut-wrap", style: { width: size, height: size } },
        React.createElement("svg", { width: size, height: size, viewBox: "0 0 " + size + " " + size },
            rings.map((rg, i) => React.createElement("circle", { key: "t"+i, cx, cy, r: rg.r, fill: "none", stroke: "#F3F4F6", strokeWidth: rg.sw })),
            rings.map((rg, i) => mkRing(rg.r, rg.pct, rg.color, rg.sw))
        ),
        React.createElement("div", { className: "donut-center" },
            React.createElement("span", { className: "donut-val" }, freeSqM + "m²"),
            React.createElement("span", { className: "donut-sub" }, "free"),
            React.createElement("span", { style: { fontSize: 10, color: '#78C043', fontWeight: 700, marginTop: 2 } }, Math.round(pctFree * 100) + "%")
