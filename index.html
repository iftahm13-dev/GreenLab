<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenLab</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#f4f6f8;color:#111827;font-size:14px}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}

/* ── Design tokens ── */
:root{
  --sb-w:240px;
  --sb-bg:#ffffff;
  --sb-act:#111827;--sb-act-text:#4ade80;
  --fo:#064e3b;--fo2:#065f46;--fo3:#047857;
  --lf:#16a34a;--lf2:#4ade80;--lf3:#dcfce7;
  --acc:#22c55e;
  --bg:#f4f6f8;--bg2:#eef0f3;--bg3:#fff;
  --card:#ffffff;--card-border:#e5e7eb;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);
  --shg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  --r:10px;--r2:14px;--r3:18px;--r4:22px;
  --to:#dc2626;--td:#fef2f2;
  --am:#d97706;--ad:#fffbeb;
  --bo:#e5e7eb;--b2:#d1d5db;
  --i1:#111827;--i2:#1f2937;--i3:#374151;--i4:#6b7280;--i5:#9ca3af;
  --ll:#f0fdf4;--ld:#bbf7d0;
  --cr:#f9fafb;--cr2:#f3f4f6;--pp:#ffffff;--cv:#e8eaed;
}

/* ── Scrollbar in sidebar ── */
.sb ::-webkit-scrollbar-thumb{background:#e5e7eb}

/* ═══════════════════════════════════
   SIDEBAR — light, clean, reference-style
═══════════════════════════════════ */
.hdr{display:none}
.app{display:flex;flex:1;min-height:0;overflow:hidden;height:100vh}
.sb{
  width:var(--sb-w);flex-shrink:0;
  background:var(--sb-bg);
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
  border-right:1px solid var(--bo);
  z-index:100;
}

/* Sidebar logo area */
.sb-logo{
  padding:20px 20px 16px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  border-bottom:1px solid var(--bo);
  margin-bottom:4px;
}
.sb-logo-ic{
  width:34px;height:34px;background:#16a34a;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 2px 8px rgba(22,163,74,.3);flex-shrink:0;
}
.sb-logo-txt{font-size:16px;color:#111827;font-weight:700;letter-spacing:-.01em}
.sb-logo-sub{font-size:9px;color:var(--i5);margin-top:1px}

/* Sidebar lab chip */
.sb-lab{
  margin:8px 12px 4px;padding:8px 11px;
  background:var(--ll);border:1px solid var(--ld);
  border-radius:var(--r2);display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:all .15s;
}
.sb-lab:hover{background:#dcfce7;border-color:#86efac}
.sb-lab-dot{width:7px;height:7px;border-radius:50%;background:var(--lf);flex-shrink:0;box-shadow:0 0 0 2px rgba(22,163,74,.2)}
.sb-lab-name{font-size:11px;font-weight:600;color:var(--fo2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-lab-arrow{font-size:10px;color:var(--i4)}

/* Sidebar section labels */
.sb-section-lbl{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--i5);padding:0 20px;margin:14px 0 4px;
}

/* Nav buttons — reference style */
.sb-nav{flex:1;overflow-y:auto;padding:4px 10px}
.nav-btn{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:9px 12px;
  border-radius:var(--r2);border:none;background:none;
  font-size:13px;font-weight:500;
  color:var(--i4);cursor:pointer;
  transition:all .15s;text-align:left;margin-bottom:2px;
}
.nav-btn:hover{background:var(--cr2);color:var(--i2)}
.nav-btn.on{
  background:var(--sb-act);color:#fff;
  box-shadow:0 2px 8px rgba(17,24,39,.15);
}
.nav-btn.on .nav-icon{color:#4ade80}
.nav-icon{
  width:30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:var(--cr2);
  transition:all .15s;
}
.nav-btn:hover .nav-icon{background:#e5e7eb}
.nav-btn.on .nav-icon{background:rgba(255,255,255,.12)}
.nav-label{flex:1;font-size:13px}

/* Sidebar greenhouse list */
.sb-top{padding:0 12px 6px;flex-shrink:0}
.sb-sc{flex:1;min-height:0;overflow-y:auto;padding:0 10px 16px}
.slbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--i5);margin-bottom:6px;padding:0 4px}
.ghi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .13s;margin-bottom:2px}
.ghi:hover{background:var(--cr2)}
.ghi.on{background:var(--ll);border-color:var(--ld)}
.ghi.on .ghnm{color:var(--fo2);font-weight:600}
.ghi.on .ghmeta{color:var(--fo3)}
.ghi.spray .ghdot{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.2);animation:pw 2s infinite}
.ghdot{width:8px;height:8px;border-radius:50%;background:var(--lf);flex-shrink:0}
.ghi.on .ghdot{background:var(--lf)}
.ghinfo{flex:1;min-width:0}
.ghnm{font-size:12px;font-weight:500;color:var(--i2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghmeta{font-size:9px;color:var(--i5);margin-top:1px}
.ghdel{opacity:0;background:none;border:none;cursor:pointer;color:var(--to);font-size:12px;padding:2px 4px;border-radius:4px}
.ghi:hover .ghdel{opacity:1}

/* Sidebar bottom */
.sb-bottom{flex-shrink:0;padding:12px;border-top:1px solid var(--bo)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:all .13s}
.sb-user:hover{background:var(--cr2)}
.sb-user-name{font-size:12px;font-weight:600;color:var(--i2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:10px;color:var(--i5);margin-top:1px}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;border:2px solid var(--bo);flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}

/* Sidebar properties panel */
.pg{margin-bottom:16px}
.pgt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--i5);margin-bottom:8px}
.pr{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pla{font-size:11px;color:var(--i4);width:48px;flex-shrink:0}
.pi{flex:1;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-size:11px;padding:5px 8px;outline:none;width:100%}
.pi:focus{border-color:var(--lf);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.piu{display:flex;align-items:center;flex:1;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);overflow:hidden}
.piu input{flex:1;background:none;border:none;color:var(--i1);font-size:11px;padding:5px 8px;outline:none;width:100%}
.piu:focus-within{border-color:var(--lf);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.pu{font-size:9px;color:var(--i4);padding-right:7px}
.pta{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i2);font-size:11px;padding:6px 8px;outline:none;resize:vertical;line-height:1.5}
.pta:focus{border-color:var(--lf);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.sc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.scard{background:var(--cr2);border:1px solid var(--bo);border-radius:var(--r);padding:8px 10px}
.sv{font-size:20px;font-weight:700;color:var(--i1);line-height:1}
.sk{font-size:9px;color:var(--i5);margin-top:2px}
.tli{display:flex;align-items:center;padding:7px 9px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;color:var(--i3)}
.tli:hover,.tli.on{border-color:var(--ld);background:var(--ll);color:var(--fo2)}
.eli{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--r);border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;transition:border-color .12s;color:var(--i3)}
.eli:hover{border-color:var(--ld);background:var(--ll)}
.eli-acts{display:none;gap:3px;flex-shrink:0}
.eli:hover .eli-acts{display:flex}
.eli-btn{background:var(--cr2);border:1px solid var(--bo);color:var(--i3);border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer}
.eli-btn:hover{background:var(--bg2);color:var(--i1)}
.eli-btn.del{color:var(--to);border-color:#fca5a5}
.eli-btn.del:hover{background:#fef2f2}

/* ═══════════════════════════════════
   SPRAY WARNING BAR
═══════════════════════════════════ */
.swarn{flex-shrink:0;background:linear-gradient(90deg,#7c1d1d,#991b1b);padding:8px 20px;display:flex;align-items:center;gap:10px;animation:pw 2.5s ease-in-out infinite}
@keyframes pw{0%,100%{opacity:1}50%{opacity:.88}}

/* ═══════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════ */
.main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* Top toolbar */
.toolbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 24px;border-bottom:1px solid var(--bo);
  background:#fff;min-height:56px;flex-wrap:wrap;
}
.tsep{width:1px;height:20px;background:var(--bo);flex-shrink:0}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.hbadge{font-size:10px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bo);color:var(--i4);background:var(--cr2);font-weight:500}
.lkbtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--i3);padding:6px 14px;border-radius:var(--r);border:1.5px solid var(--bo);cursor:pointer;background:#fff;transition:all .13s}
.lkbtn:hover{background:var(--cr2)}
.lkbtn.edit{color:var(--am);border-color:#fcd34d;background:#fffbeb}
.lab-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--ll);font-size:11px;color:var(--fo2);font-weight:600;cursor:pointer;border:1px solid var(--ld);transition:all .13s}
.lab-chip:hover{background:#dcfce7}
.lab-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0}
.enote{font-size:11px;font-weight:600;color:var(--am);padding:5px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r)}
.tenote{font-size:11px;font-weight:600;color:#1d4ed8;padding:5px 12px;background:#eff6ff;border:1px solid #93c5fd;border-radius:var(--r)}
.tmeta{font-size:10px;color:var(--i4);margin-left:auto}
.zbtn{width:30px;height:30px;border-radius:var(--r);border:1.5px solid var(--bo);background:#fff;color:var(--i3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.zbtn:hover{background:var(--cr2);border-color:var(--b2)}
.zval{font-size:11px;color:var(--i4);min-width:36px;text-align:center}
.selbtn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--bo);background:#fff;color:var(--i3);transition:all .13s}
.selbtn.on{background:var(--ll);border-color:var(--ld);color:var(--fo2);font-weight:600}

/* ═══════════════════════════════════
   CANVAS / LAYOUT VIEW
═══════════════════════════════════ */
.cvp{flex:1;min-height:0;overflow:hidden;background:#f0f2f5;background-image:radial-gradient(circle,#d1d5db 1px,transparent 1px);background-size:22px 22px;position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
.cvp.panning{cursor:grabbing!important}
.cvp.space-mode{cursor:grab}
.cvw{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;touch-action:none}
.ghr{position:absolute;top:0;left:0;background:#fff;border:1.5px solid #e5e7eb;border-radius:16px;box-shadow:var(--sh);overflow:visible}
.rgrid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(#f3f4f6 1px,transparent 1px),linear-gradient(90deg,#f3f4f6 1px,transparent 1px);background-size:40px 40px;border-radius:16px}
.rlabel{position:absolute;top:10px;left:14px;font-size:12px;color:var(--i4);pointer-events:none;font-weight:500}
.cvhint{position:absolute;bottom:14px;right:14px;background:rgba(255,255,255,.95);border:1px solid var(--bo);border-radius:var(--r2);padding:7px 12px;font-size:10px;color:var(--i4);line-height:1.8;pointer-events:none;z-index:10;box-shadow:var(--sh)}
.sobj{position:absolute;display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none}
.sobj:hover{z-index:50}
.sobj.dragging{cursor:grabbing;z-index:200;opacity:.9}
.sobj.locked{cursor:default}

/* Table blocks */
.tbl{position:absolute;background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;display:flex;flex-direction:column;overflow:visible;transition:border-color .15s;box-shadow:var(--sh)}
.tbl:hover{border-color:#86efac;box-shadow:0 4px 16px rgba(22,163,74,.1)}
.tbl.sel{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.12),var(--sh)}
.tbl.tedit{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.tbl.dragging{box-shadow:var(--sh2);opacity:.93;z-index:200;cursor:grabbing!important}
.tbl.locked .thd{cursor:default}
.thd{flex-shrink:0;background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;border-radius:12px 12px 0 0}
.tbl.tedit .thd{background:#eff6ff;border-bottom-color:#bfdbfe}
.thnm{font-size:10px;font-weight:700;color:var(--i2);letter-spacing:.03em}
.thinfo{font-size:9px;color:var(--i4)}
.thedit{font-size:11px;background:#16a34a;border:none;color:#fff;border-radius:var(--r);padding:5px 14px;cursor:pointer;font-weight:600;white-space:nowrap;transition:all .12s;box-shadow:0 1px 4px rgba(22,163,74,.3)}
.thedit:hover{background:#15803d;box-shadow:0 2px 8px rgba(22,163,74,.4)}
.pgrid{flex:1;display:grid;padding:5px;overflow:visible;align-items:center;justify-items:center}

/* Pot cells */
.pcw{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;position:relative;user-select:none}
.pcw:hover{z-index:10}
.pcw:hover .psvg{transform:scale(1.1)}
.pcw.active .psvg{transform:scale(1.06)}
.pcw.temode{cursor:default}
.pcw.temode:hover .psvg{transform:none}
.pcw.temode:hover .pdel{display:flex}
.pcw.sel-mode{cursor:cell}
.pcw.pot-sel{outline:2.5px solid #16a34a;outline-offset:3px;border-radius:8px;background:rgba(22,163,74,.08);z-index:15}
.pcw.pot-sel .psvg{transform:scale(1.06)}
.pcw.pot-sel .plbl{background:rgba(187,247,208,.8);color:#14532d}
.psvg{transition:transform .1s;display:block}
.plbl{display:flex;align-items:center;justify-content:center;font-weight:600;color:#111827;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:none;background:rgba(255,255,255,.95);border-radius:5px;padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.07);flex-shrink:0;letter-spacing:-0.03em}
.pslot{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:default}
.pslot.addmode{cursor:pointer}
.pdel{display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--to);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;align-items:center;justify-content:center;z-index:30;font-weight:700;line-height:1}
.eov{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:5}

/* Selection banner */
.ssel{display:flex;align-items:center;gap:10px;padding:8px 24px;background:#111827;color:#fff;font-size:12px;flex-shrink:0}
.ssel strong{color:#4ade80}

/* Status bar */
.sbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:6px 24px;border-top:1px solid var(--bo);background:#fff}
.si{font-size:10px;color:var(--i4);display:flex;align-items:center;gap:4px}
.si strong{color:var(--i2)}
.sidot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════════════════
   POT POPUP (float panel)
═══════════════════════════════════ */
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop{position:fixed;z-index:700;background:#fff;border:1px solid var(--bo);border-radius:var(--r3);box-shadow:var(--sh2);width:316px;animation:pop .15s ease;display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
.pph{padding:14px 16px 12px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;background:#f9fafb;border-radius:var(--r3) var(--r3) 0 0}
.pppre{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pptit{font-size:13px;font-weight:700;color:var(--i1)}
.ppsub{font-size:10px;color:var(--i4);margin-top:2px}
.ppx{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--i4);font-size:18px;padding:0;line-height:1;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.ppx:hover{color:var(--i1);background:var(--cr2)}
.ppb{padding:14px 16px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;flex:1;min-height:0}
.ppf{padding:10px 16px;border-top:1px solid var(--bo);display:flex;align-items:center;gap:7px;flex-shrink:0;background:#f9fafb}
.fl{display:block;font-size:11px;font-weight:600;color:var(--i3);margin-bottom:4px}
.fi{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-size:13px;padding:8px 10px;outline:none;transition:border-color .12s}
.fi:focus{border-color:var(--lf);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.fi.big{font-size:14px;font-weight:600}
.fta{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i1);font-size:12px;padding:8px 10px;outline:none;resize:none;line-height:1.5;transition:border-color .12s}
.fta:focus{border-color:var(--lf);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid var(--bo);color:var(--i4);font-weight:500;transition:all .12s;background:#fff}
.pill:hover{border-color:var(--b2);color:var(--i2)}
.ph{background:#f0fdf4;border-color:#86efac;color:#166534}
.pw{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.pd{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.stylgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stopt{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 3px;border-radius:var(--r);cursor:pointer;border:1.5px solid var(--bo);background:#fff;transition:all .12s}
.stopt:hover{border-color:var(--ld)}
.stopt.on{border-color:#16a34a;background:var(--ll)}
.stopt-lbl{font-size:8px;color:var(--i4);text-align:center}
