<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenLab</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,textarea,select,button{font-family:inherit}
html,body{height:100%}
body{font-family:'Poppins','Inter',sans-serif;background:#F9FAFB;color:#333333;font-size:14px}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:10px}

/* ── Design tokens ── */
:root{
  --sb-w:260px;
  --sb-bg:#ffffff;
  --sb-act:#78C043;--sb-act-text:#ffffff;
  --fo:#2d6a1f;--fo2:#3a7d28;--fo3:#4a9a32;
  --lf:#78C043;--lf2:#a8d878;--lf3:#edf7e3;
  --acc:#78C043;
  --bg:#F9FAFB;--bg2:#F3F4F6;--bg3:#fff;
  --card:#ffffff;--card-border:#E5E7EB;
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --sh2:0 4px 16px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.05);
  --shg:0 10px 25px -5px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --sh-card:0 10px 25px -5px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.03);
  --r:12px;--r2:16px;--r3:20px;--r4:24px;
  --to:#dc2626;--td:#fef2f2;
  --am:#d97706;--ad:#fffbeb;
  --bo:#E5E7EB;--b2:#D1D5DB;
  --i1:#333333;--i2:#374151;--i3:#4B5563;--i4:#6B7280;--i5:#9CA3AF;
  --ll:#edf7e3;--ld:#c3e6a8;
  --cr:#F9FAFB;--cr2:#F3F4F6;--pp:#ffffff;--cv:#e8eaed;
  --c-carb:#78C043;--c-prot:#FFB74D;--c-fat:#FF8A65;
}

/* ── Scrollbar in sidebar ── */
.sb ::-webkit-scrollbar-thumb{background:#D1D5DB}

/* ═══════════════════════════════════
   SIDEBAR — light, clean, reference-style
═══════════════════════════════════ */
/* ── Sunlight / high-contrast mode ── */
body.sunlight{background:#fff;color:#000;font-size:16px}
body.sunlight .pop,body.sunlight .mo,body.sunlight .bc-modal{background:#fff;color:#000}
body.sunlight .tbl{border:3px solid #000;box-shadow:none}
body.sunlight .thd{background:#fff;border-bottom:3px solid #000}
body.sunlight .thnm{font-size:15px;font-weight:800;color:#000}
body.sunlight .plbl{font-size:14px!important;font-weight:900;color:#000!important;background:#fff!important;letter-spacing:0!important}
body.sunlight .pgrid{background:#e8e8e8}
body.sunlight .pcw.pot-sel{outline:4px solid #000;box-shadow:0 0 0 7px rgba(0,0,0,.25)}
body.sunlight .bulk-panel{background:#000;color:#fff}
body.sunlight .fi,.sunlight input,.sunlight select,.sunlight textarea{font-size:15px;border:2px solid #000;background:#fff;color:#000}
body.sunlight .btn{font-size:13px;font-weight:700;border:2px solid currentColor}
body.sunlight .btnp{background:#000;color:#fff;border-color:#000}
body.sunlight .sb{background:#fff;border-right:3px solid #000}
body.sunlight .nav-btn{font-size:13px;font-weight:700}
body.sunlight .ppb{font-size:14px}
body.sunlight .fl{font-size:13px;font-weight:800}
body.sunlight label{font-weight:800}
body.sunlight .meas-row{border-bottom:2px solid #000}
body.sunlight .stk-item{border:2px solid #000}
body.sunlight .tab-btn{font-size:13px;font-weight:700;border:2px solid #000}
body.sunlight .tab-btn.on{background:#000;color:#fff}
body.sunlight .toolbar{border-bottom:2px solid #000;background:#f0f0f0}
/* sunlight toggle button */
.sunlight-btn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--bo);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--i3);font-family:inherit;transition:all .15s}
.sunlight-btn.on{background:#fbbf24;border-color:#f59e0b;color:#78350f}
body.sunlight .sunlight-btn.on{background:#000;color:#fff;border-color:#000}

.hdr{display:none}
.app{display:flex;flex:1;min-height:0;overflow:hidden;height:100vh}
.sb{
  width:var(--sb-w);flex-shrink:0;
  background:#fff;
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
  border-right:1px solid #EBEBEB;
  z-index:100;
}

/* Sidebar logo area */
.sb-logo{
  padding:24px 20px 20px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  border-bottom:none;
  margin-bottom:4px;
}
.sb-logo-ic{
  width:40px;height:40px;background:transparent;border-radius:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:none;flex-shrink:0;
}
.sb-logo-txt{font-size:16px;color:#333333;font-weight:700;letter-spacing:-.01em;font-family:'Poppins',sans-serif}
.sb-logo-sub{font-size:9px;color:var(--i5);margin-top:1px}

/* Sidebar lab chip */
.sb-lab{
  margin:8px 14px 4px;padding:9px 13px;
  background:#edf7e3;border:1px solid #c3e6a8;
  border-radius:50px;display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:all .15s;
}
.sb-lab:hover{background:#dff0ce;border-color:#a8d878}
.sb-lab-dot{width:7px;height:7px;border-radius:50%;background:#78C043;flex-shrink:0;box-shadow:0 0 0 2px rgba(120,192,67,.2)}
.sb-lab-name{font-size:11px;font-weight:600;color:#3a7d28;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-lab-arrow{font-size:10px;color:var(--i4)}

/* Sidebar section labels */
.sb-section-lbl{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--i5);padding:0 20px;margin:14px 0 4px;
}

/* Nav buttons — reference style */
.sb-nav{display:none}
.nav-btn{
  display:flex;align-items:center;gap:13px;
  width:100%;padding:10px 14px;
  border-radius:50px;border:none;background:none;
  font-size:13px;font-weight:500;
  color:#6B7280;cursor:pointer;
  transition:all .18s;text-align:left;margin-bottom:2px;
  font-family:'Poppins',sans-serif;
}
.nav-btn:hover{background:#F5F5F5;color:#333333}
.nav-btn.on{
  background:#78C043;color:#fff;
  box-shadow:0 6px 18px rgba(120,192,67,.35);
}
.nav-btn.on .nav-icon{background:rgba(255,255,255,.22);color:#fff}
.nav-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:#F3F4F6;
  transition:all .18s;
}
.nav-btn:hover:not(.on) .nav-icon{background:#EBEBEB}
.nav-label{flex:1;font-size:13px;font-weight:500}
/* Bottom settings items in sidebar */
.sb-nav-bottom{padding:4px 16px 8px;flex-shrink:0;border-top:1px solid #F5F5F5}

/* Sidebar greenhouse list */
.sb-top{padding:0 12px 6px;flex-shrink:0}
.sb-sc{flex:1;min-height:0;overflow-y:auto;padding:0 10px 16px}
.slbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--i5);margin-bottom:6px;padding:0 4px}
.ghi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .13s;margin-bottom:2px}
.ghi:hover{background:var(--cr2)}
.ghi.on{background:#edf7e3;border-color:#c3e6a8}
.ghi.on .ghnm{color:#3a7d28;font-weight:600}
.ghi.on .ghmeta{color:#4a9a32}
.ghi.spray .ghdot{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.2);animation:pw 2s infinite}
.ghdot{width:8px;height:8px;border-radius:50%;background:#78C043;flex-shrink:0}
.ghi.on .ghdot{background:#78C043}
.ghinfo{flex:1;min-width:0}
.ghnm{font-size:12px;font-weight:500;color:var(--i2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghmeta{font-size:9px;color:var(--i5);margin-top:1px}
.ghdel{opacity:0;background:none;border:none;cursor:pointer;color:var(--to);font-size:12px;padding:2px 4px;border-radius:4px}
.ghi:hover .ghdel{opacity:1}

/* Sidebar bottom */
.sb-bottom{flex-shrink:0;padding:10px 16px 20px;border-top:1px solid #F0F0F0}
.sb-setting-btn{display:none;
  display:flex;align-items:center;gap:13px;
  width:100%;padding:10px 14px;
  border-radius:50px;border:none;background:none;
  font-size:13px;font-weight:500;
  color:#6B7280;cursor:pointer;
  transition:all .18s;text-align:left;margin-bottom:2px;
  font-family:'Poppins',sans-serif;
}
.sb-setting-btn:hover{background:#F5F5F5;color:#333333}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;cursor:pointer;transition:all .13s}
.sb-user:hover{background:#F3F4F6}
.sb-user-name{font-size:12px;font-weight:600;color:var(--i2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:10px;color:var(--i5);margin-top:1px}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;border:2px solid var(--bo);flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}

/* Sidebar properties panel */
.pg{margin-bottom:16px}
.pgt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--i5);margin-bottom:8px}
.pr{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pla{font-size:11px;color:var(--i4);width:48px;flex-shrink:0}
.pi{flex:1;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:10px;color:#333333;font-size:11px;padding:5px 8px;outline:none;width:100%}
.pi:focus{border-color:#78C043;background:#fff;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.piu{display:flex;align-items:center;flex:1;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);overflow:hidden}
.piu input{flex:1;background:none;border:none;color:var(--i1);font-size:11px;padding:5px 8px;outline:none;width:100%}
.piu:focus-within{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.pu{font-size:9px;color:var(--i4);padding-right:7px}
.pta{width:100%;background:var(--cr2);border:1.5px solid var(--bo);border-radius:var(--r);color:var(--i2);font-size:11px;padding:6px 8px;outline:none;resize:vertical;line-height:1.5}
.pta:focus{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.12)}
.sc{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.scard{background:var(--cr2);border:1px solid var(--bo);border-radius:var(--r);padding:8px 10px}
.sv{font-size:20px;font-weight:700;color:var(--i1);line-height:1}
.sk{font-size:9px;color:var(--i5);margin-top:2px}
.tli{display:flex;align-items:center;padding:7px 9px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;color:var(--i3)}
.tli:hover,.tli.on{border-color:#c3e6a8;background:#edf7e3;color:#3a7d28}
.eli{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:var(--r);border:1px solid var(--bo);background:#fff;font-size:11px;margin-bottom:3px;transition:border-color .12s;color:var(--i3)}
.eli:hover{border-color:#c3e6a8;background:#edf7e3}
.eli-acts{display:none;gap:3px;flex-shrink:0}
.eli:hover .eli-acts{display:flex}
.eli-btn{background:var(--cr2);border:1px solid var(--bo);color:var(--i3);border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer}
.eli-btn:hover{background:var(--bg2);color:var(--i1)}
.eli-btn.del{color:var(--to);border-color:#fca5a5}
.eli-btn.del:hover{background:#fef2f2}

/* ═══════════════════════════════════
   SPRAY WARNING BAR
═══════════════════════════════════ */
.swarn{flex-shrink:0;background:linear-gradient(90deg,#7c1d1d,#991b1b);padding:8px 20px;display:flex;align-items:center;gap:10px;animation:pw 2.5s ease-in-out infinite}
@keyframes pw{0%,100%{opacity:1}50%{opacity:.88}}

/* ═══════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════ */
.main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:#F9FAFB;border-left:1px solid #F0F0F0;position:relative}

/* Top toolbar */
.toolbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 24px;border-bottom:1px solid #F0F0F0;
  background:#fff;min-height:54px;flex-wrap:wrap;
}
.tsep{width:1px;height:20px;background:var(--bo);flex-shrink:0}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.hbadge{font-size:10px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bo);color:var(--i4);background:var(--cr2);font-weight:500}
.lkbtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#4B5563;padding:7px 16px;border-radius:50px;border:1.5px solid #E5E7EB;cursor:pointer;background:#fff;transition:all .13s}
.lkbtn:hover{background:var(--cr2)}
.lkbtn.edit{color:#d97706;border-color:#fcd34d;background:#fffbeb;font-weight:700}
.lab-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--ll);font-size:11px;color:var(--fo2);font-weight:600;cursor:pointer;border:1px solid var(--ld);transition:all .13s}
.lab-chip:hover{background:#dff0ce}
.lab-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--lf);flex-shrink:0}
.enote{font-size:11px;font-weight:600;color:var(--am);padding:5px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r)}
.tenote{font-size:11px;font-weight:600;color:#1d4ed8;padding:5px 12px;background:#eff6ff;border:1px solid #93c5fd;border-radius:var(--r)}
.tmeta{font-size:10px;color:var(--i4);margin-left:auto}
.zbtn{width:30px;height:30px;border-radius:var(--r);border:1.5px solid var(--bo);background:#fff;color:var(--i3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.zbtn:hover{background:var(--cr2);border-color:var(--b2)}
.zval{font-size:11px;color:var(--i4);min-width:36px;text-align:center}
.selbtn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--bo);background:#fff;color:var(--i3);transition:all .13s}
.selbtn.on{background:#edf7e3;border-color:#c3e6a8;color:#3a7d28;font-weight:600}

/* ═══════════════════════════════════
   CANVAS / LAYOUT VIEW
═══════════════════════════════════ */
.cvp{flex:1;min-height:0;overflow:hidden;background:#F4F6F8;background-image:radial-gradient(circle,#D1D5DB 1px,transparent 1px);background-size:22px 22px;position:relative;touch-action:none;-webkit-user-select:none;user-select:none;cursor:grab;cursor:grab}
.cvp:active{cursor:grabbing}
.cvp.panning{cursor:grabbing!important}
.cvp.space-mode{cursor:grab}
.cvw{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;touch-action:none}
.ghr{position:absolute;top:0;left:0;background:#fff;border:1.5px solid #e5e7eb;border-radius:16px;box-shadow:var(--sh);overflow:visible}
.rgrid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(#f3f4f6 1px,transparent 1px),linear-gradient(90deg,#f3f4f6 1px,transparent 1px);background-size:40px 40px;border-radius:16px}
.rlabel{position:absolute;top:10px;left:14px;font-size:12px;color:var(--i4);pointer-events:none;font-weight:500}
.cvhint{position:absolute;bottom:14px;right:14px;background:rgba(255,255,255,.95);border:1px solid var(--bo);border-radius:var(--r2);padding:7px 12px;font-size:10px;color:var(--i4);line-height:1.8;pointer-events:none;z-index:10;box-shadow:var(--sh)}
.sobj{position:absolute;display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none}
.sobj:hover{z-index:50}
.sobj.dragging{cursor:grabbing;z-index:200;opacity:.9}
.sobj.locked{cursor:default}

/* Table blocks */
.tbl{position:absolute;background:#fff;border:2px solid #D1D5DB;border-radius:14px;display:flex;flex-direction:column;overflow:visible;transition:border-color .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07);z-index:1;visibility:visible}
.tbl:hover{border-color:#c3e6a8;box-shadow:0 4px 16px rgba(120,192,67,.1)}
.tbl.sel{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.25),var(--sh-card);background:#edf7e3;z-index:3}
.tbl.tedit{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);z-index:3}
.tbl.sync-failed{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.15),var(--sh)!important;background:#fff5f5!important}
.tbl.sync-failed .thd{background:#fef2f2!important;border-bottom-color:#fca5a5!important}
.tbl-sync-banner{position:absolute;bottom:100%;left:0;right:0;background:#ef4444;color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px 6px 0 0;text-align:center;cursor:pointer;white-space:nowrap;z-index:10}
.tbl-sync-banner:hover{background:#dc2626}
/* Severity scale */
.sev-bar{display:flex;gap:3px;align-items:center;margin-top:4px}
.sev-pip{width:22px;height:8px;border-radius:3px;border:1.5px solid #e5e7eb;cursor:pointer;transition:all .12s;background:#f3f4f6}
.sev-pip.on-1,.sev-pip.on-2{background:#86efac;border-color:#22c55e}
.sev-pip.on-3{background:#fde68a;border-color:#f59e0b}
.sev-pip.on-4,.sev-pip.on-5{background:#fca5a5;border-color:#ef4444}
.sev-label{font-size:10px;color:var(--i4);margin-left:4px;font-weight:600}
/* Treatment log rows */
.tlog-row{display:flex;flex-direction:column;gap:2px;background:var(--cr2);border-radius:8px;padding:7px 10px;border-left:3px solid var(--fo);margin-top:3px}
.tlog-name{font-size:11px;font-weight:600;color:var(--i2)}
.tlog-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--i4)}
.tlog-meta span{display:flex;align-items:center;gap:2px}
/* Experiment Timeline */
.etl-page{flex:1;min-height:0;overflow-y:auto;padding:18px 24px;display:flex;flex-direction:column;gap:16px}
.etl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.etl-title{font-size:13px;font-weight:700;color:var(--i1)}
.etl-exp-card{background:#fff;border:1.5px solid var(--bo);border-radius:12px;overflow:hidden}
.etl-exp-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.etl-exp-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.etl-exp-name{font-size:12px;font-weight:700;color:var(--i1);flex:1}
.etl-chevron{font-size:11px;color:var(--i4);transition:transform .15s}
.etl-milestone-list{padding:0 14px 12px 14px;display:flex;flex-direction:column;gap:6px}
.etl-ms-row{display:flex;align-items:flex-start;gap:10px}
.etl-ms-dot{width:8px;height:8px;border-radius:50%;background:var(--fo);flex-shrink:0;margin-top:4px}
.etl-ms-content{flex:1}
.etl-ms-day{font-size:9px;font-weight:700;color:var(--fo3);text-transform:uppercase;letter-spacing:.06em}
.etl-ms-label{font-size:12px;font-weight:600;color:var(--i1);margin:1px 0}
.etl-ms-note{font-size:10px;color:var(--i4)}

.plbl{display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;color:#111;text-align:center;overflow:hidden;user-select:none;background:#fff;border-radius:5px;padding:2px 3px;box-shadow:0 1px 3px rgba(0,0,0,.22);flex-shrink:0;letter-spacing:0;line-height:1.18;position:relative;z-index:5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

.dash-tit{font-size:20px;color:#333333;font-weight:700;font-family:'Poppins',sans-serif}
.dash-body{flex:1;min-height:0;overflow-y:auto;padding:24px;display:flex;flex-wrap:wrap;gap:20px;align-content:flex-start;background:#F9FAFB}
.widget-card{background:#fff;border:1px solid #F0F0F0;border-radius:24px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:260px;box-shadow:0 10px 25px -5px rgba(0,0,0,.05)}
.widget-card h3{font-size:11px;font-weight:700;color:#6B7280;text-align:center;text-transform:uppercase;letter-spacing:.08em;font-family:'Poppins',sans-serif}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.donut-val{font-size:22px;font-weight:700;color:#78C043;line-height:1;font-family:'Poppins',sans-serif}
.donut-sub{font-size:10px;color:var(--i4);margin-top:3px}
.donut-legend{display:flex;flex-direction:column;gap:6px;width:100%}
.dl-row{display:flex;align-items:center;gap:8px;font-size:11px}
.dl-dot{width:10px;height:10px;border-radius:4px;flex-shrink:0}
.dl-label{color:var(--i3);flex:1}
.dl-val{color:var(--i2);font-weight:600}

/* ═══════════════════════════════════
   SYNC STATUS
═══════════════════════════════════ */
.sync-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:default;transition:all .3s;flex-shrink:0;border:1.5px solid transparent}
.sync-chip.saving{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.sync-chip.pending{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
.sync-chip.loading{background:#f9fafb;border-color:#e5e7eb;color:#6b7280}
.sync-chip.saved{background:#edf7e3;border-color:#c3e6a8;color:#2d6a1f}
.sync-chip.error{background:#fef2f2;border-color:#fca5a5;color:#991b1b;cursor:pointer}
.sync-chip.nosync{background:var(--cr2);border-color:var(--bo);color:var(--i4)}
.sync-chip.synced{background:var(--ll);border-color:var(--ld);color:#166534}
.sync-chip.poll{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:#f59e0b;animation:pulse-dot 1s ease-in-out infinite}
.sync-dot.pending{background:#3b82f6;animation:pulse-dot .8s ease-in-out infinite}
.sync-dot.loading{background:#9ca3af;animation:pulse-dot 1.2s ease-in-out infinite}
.sync-dot.saved,.sync-dot.synced{background:#78C043}
.sync-dot.poll{background:#f97316;animation:pulse-dot 2s ease-in-out infinite}
.sync-dot.error{background:#ef4444;animation:pulse-dot .6s ease-in-out infinite}
.sync-dot.nosync{background:var(--i5)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes spin-ptr{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ═══════════════════════════════════
   FIREBASE PANEL
═══════════════════════════════════ */
.fb-panel{position:fixed;inset:0;background:rgba(17,24,39,.5);backdrop-filter:blur(8px);z-index:1500;display:flex;align-items:center;justify-content:center}
.fb-card{background:#fff;border:1px solid var(--bo);border-radius:var(--r4);padding:28px;width:520px;max-width:93vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shg);animation:mi .18s ease}
.fb-card h2{font-size:19px;color:var(--i1);margin-bottom:4px;font-weight:700}
.fb-card .sub{font-size:12px;color:var(--i4);margin-bottom:18px;line-height:1.5}
.fb-section{margin-bottom:18px}
.fb-section h3{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--i4);margin-bottom:8px}
.fb-status-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:6px}
.fb-status-row.local{background:#fffbeb;border:1px solid #fcd34d}
.fb-status-row.firebase{background:var(--ll);border:1px solid var(--ld)}
.fb-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.fb-tag.local{background:#fef3c7;color:#92400e}
.fb-tag.firebase{background:#edf7e3;color:#2d6a1f}
.code-block{background:#0f172a;border-radius:var(--r2);padding:12px 14px;font-size:10px;color:#7dd3a8;line-height:1.7;margin-top:7px;overflow-x:auto;white-space:pre}
.fb-steps{list-style:none;display:flex;flex-direction:column;gap:8px}
.fb-steps li{display:flex;gap:10px;font-size:12px;color:var(--i2);line-height:1.5}
.fb-steps li::before{content:attr(data-n);width:22px;height:22px;border-radius:50%;background:#78C043;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.activity-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bo);font-size:11px;color:var(--i3)}
.activity-row:last-child{border-bottom:none}
.activity-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}

/* ═══════════════════════════════════
   LAB SELECTION SCREEN
═══════════════════════════════════ */
.lab-screen{position:fixed;inset:0;background:#1a4a1a;display:flex;align-items:center;justify-content:center;z-index:3000;overflow:hidden}
.lab-screen-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;z-index:0;pointer-events:none}
.lab-screen-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,50,15,.5) 0%,rgba(4,30,8,.75) 100%);z-index:1;pointer-events:none}
.lab-screen > *:not(.lab-screen-bg):not(.lab-screen-ov){position:relative;z-index:2}
.lab-card{background:rgba(255,255,255,.97);border-radius:var(--r4);padding:40px;width:420px;max-width:93vw;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:mi .2s ease}
.lab-tag{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:#edf7e3;color:#2d6a1f;border:1px solid #c3e6a8;margin-bottom:14px}
.lab-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--r2);border:1.5px solid var(--bo);background:#fff;cursor:pointer;transition:all .15s;margin-bottom:6px}
.lab-item:hover{border-color:#c3e6a8;background:#f9fafb;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.lab-item.on{border-color:#78C043;background:#edf7e3}
.lab-ic{width:42px;height:42px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#78C043;box-shadow:0 2px 8px rgba(120,192,67,.3)}
.lab-nm{font-size:14px;font-weight:600;color:var(--i1)}
.lab-meta{font-size:10px;color:var(--i4);margin-top:2px}
.lab-item-wrap{position:relative;margin-bottom:6px}
.lab-settings-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:1.5px solid var(--bo);color:var(--i4);border-radius:var(--r);padding:4px 10px;font-size:10px;cursor:pointer;font-weight:600;z-index:2;transition:all .12s}
.lab-settings-btn:hover{background:var(--cr2);border-color:var(--b2);color:var(--i2)}
.lab-settings-panel{background:var(--cr2);border:1px solid var(--bo);border-radius:var(--r2);padding:16px;margin-bottom:8px}
.lsp-title{font-size:11px;font-weight:700;color:#78C043;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.del-warn{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--r);padding:11px 13px;font-size:12px;color:#991b1b;line-height:1.5;margin-bottom:14px}
.pw-err{font-size:11px;color:var(--to);margin-top:4px;font-weight:600}
.pw-ok{font-size:11px;color:#78C043;margin-top:4px;font-weight:600}

/* ═══════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════ */
.lsc{position:fixed;inset:0;background:#1a4a1a;display:flex;align-items:center;justify-content:center;z-index:2000;overflow:hidden}
.lsc-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;z-index:0;pointer-events:none}
.lsc-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,50,15,.5) 0%,rgba(4,30,8,.75) 100%);z-index:1;pointer-events:none}
.lsc > *:not(.lsc-bg):not(.lsc-ov){position:relative;z-index:2}
.lcard{background:rgba(255,255,255,.97);border-radius:var(--r4);padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:mi .2s ease}
.llogt{font-size:22px;color:var(--i1);margin-bottom:3px;font-weight:700}
.lsub{font-size:12px;color:var(--i4);margin-bottom:24px;line-height:1.5}
.lmems{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.lmem{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r2);border:1.5px solid var(--bo);background:#fff;cursor:pointer;transition:all .13s}
.lmem:hover{border-color:#c3e6a8;background:#edf7e3;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;overflow:hidden}
.lav img{width:100%;height:100%;object-fit:cover}
.ldiv{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--i5);font-size:11px}
.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--bo)}

/* ═══════════════════════════════════
   MISC
═══════════════════════════════════ */
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.csw:hover{transform:scale(1.15)}
.csw.on{border-color:#78C043;box-shadow:0 0 0 3px rgba(120,192,67,.18)}
.online-bar{display:flex;align-items:center;gap:4px;padding:0 6px;background:#edf7e3;border-radius:50px;border:1px solid #c3e6a8;height:32px}
.online-bar-lbl{font-size:10px;font-weight:600;color:#3a7d28;white-space:nowrap;padding:0 2px 0 4px}
.online-av{width:22px;height:22px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;cursor:default;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 1.5px #78C043}
.online-av img{width:100%;height:100%;object-fit:cover}
.online-dot{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#22c55e;border:1.5px solid #fff}
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:24px;font-size:12px;font-weight:500;box-shadow:var(--shg);z-index:2000;animation:fi .18s ease;display:flex;align-items:center;gap:8px;white-space:nowrap;pointer-events:none}
/* Task flag badge on pots */
.task-badge{position:absolute;top:-4px;left:-4px;width:14px;height:14px;border-radius:50%;background:#f59e0b;border:2px solid #fff;z-index:25;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.3)}
/* Tasks panel */
.tasks-panel{position:fixed;right:0;top:0;bottom:0;width:min(340px,100vw);background:#fff;border-left:1px solid var(--bo);z-index:500;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.tasks-panel-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;flex-shrink:0}
.tasks-panel-hdr h3{flex:1;margin:0;font-size:14px;font-weight:700}
.tasks-list{flex:1;overflow-y:auto;padding:10px}
.task-item{background:#fff;border:1.5px solid var(--bo);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;flex-direction:column;gap:4px}
.task-item.done{opacity:.5;border-style:dashed}
.task-item-title{font-size:13px;font-weight:600;color:var(--i1)}
.task-item-meta{font-size:11px;color:var(--i4);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.task-due-warn{color:#dc2626;font-weight:700}
.tasks-add-btn{position:sticky;bottom:0;padding:12px;border-top:1px solid var(--bo);background:#fff;flex-shrink:0}
/* RCBD modal */
.rcbd-groups{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.rcbd-group-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--bo);background:var(--bg)}
.rcbd-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.rcbd-result{margin-top:10px;padding:10px;background:var(--ll);border-radius:8px;border:1px solid var(--ld);font-size:11px;color:var(--fo2);line-height:1.7}
/* Barcode / QR export modal */
.bc-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:center;justify-content:center}
.bc-modal{background:#fff;border-radius:16px;width:min(780px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.bc-modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;flex-shrink:0}
.bc-modal-hdr h3{flex:1;font-size:15px;font-weight:700;color:var(--i1);margin:0}
.bc-modal-body{flex:1;overflow-y:auto;padding:16px}
.bc-modal-foot{padding:12px 20px;border-top:1px solid var(--bo);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.bc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.bc-card{border:1.5px solid #E5E7EB;border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;background:#fff;page-break-inside:avoid}
.bc-card-lbl{font-size:11px;font-weight:700;color:#111;text-align:center;word-break:break-all;max-width:160px}
.bc-card-sub{font-size:9px;color:#6B7280;text-align:center;line-height:1.5}
.bc-card-id{font-size:8px;color:#9CA3AF;font-family:monospace}
/* QR scanner overlay */
.qr-scan-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pop-inline{position:static!important;box-shadow:none!important;border-radius:0!important;max-height:none!important;width:100%!important}
.qr-scan-box{width:min(360px,90vw);background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.qr-scan-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bo)}
.qr-scan-hdr h3{margin:0;font-size:15px;font-weight:700}
#qr-reader{width:100%}
#qr-reader video{width:100%!important;border-radius:0}
#qr-reader img{display:none}
.qr-scan-status{padding:12px 16px;font-size:12px;color:var(--i3);text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center}
/* QR in popup */
.qr-popup-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0 4px}
.qr-popup-wrap canvas,.qr-popup-wrap img{border-radius:6px;border:1px solid var(--bo)}
@media print{.bc-modal-hdr,.bc-modal-foot{display:none!important}.bc-modal{width:100%;max-height:none;box-shadow:none;border-radius:0}.bc-modal-ov{position:static;background:none}.bc-modal-body{padding:8px}.bc-grid{gap:8px}}
.ndot{width:6px;height:6px;border-radius:50%;background:#78C043;flex-shrink:0}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--i4);padding:40px}
.ac-wrap{position:relative;width:100%}
.ac-drop{background:#fff;border:1.5px solid var(--bo);border-radius:var(--r2);box-shadow:var(--sh2);z-index:9999;max-height:160px;overflow-y:auto;min-width:0;box-sizing:border-box}
.ac-item{padding:9px 12px;font-size:12px;color:var(--i2);cursor:pointer;border-bottom:1px solid var(--bo)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.hi{background:var(--ll);color:#166534}
.hbadge{font-size:10px;padding:5px 12px;border-radius:50px;border:1.5px solid #E5E7EB;color:#6B7280;background:#fff;font-weight:500}
.mm{}

/* ── Horizontal tab bar ── */
.tab-bar{
  flex-shrink:0;display:flex;align-items:center;gap:0;
  padding:0;background:#F9FAFB;
  border-bottom:1px solid #EBEBEB;
  position:relative;z-index:50;
  overflow:hidden;
}
.tab-bar-scroll{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  flex:1;min-width:0;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tab-bar-scroll::-webkit-scrollbar{display:none}
.tab-scroll-btn{
  flex-shrink:0;width:26px;height:100%;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  background:#F9FAFB;border:none;cursor:pointer;
  color:#6B7280;font-size:14px;padding:0;
  transition:color .15s,background .15s;
  position:relative;z-index:2;
}
.tab-scroll-btn:hover{background:#F0F0F0;color:#333}
.tab-scroll-btn.left{border-right:1px solid #EBEBEB;box-shadow:4px 0 8px rgba(0,0,0,.06)}
.tab-scroll-btn.right{border-left:1px solid #EBEBEB;box-shadow:-4px 0 8px rgba(0,0,0,.06)}

.tab-btn{
  display:inline-flex;align-items:center;gap:4px;
  height:30px;padding:0 10px 0 4px;
  border:1.5px solid #E5E7EB;border-radius:50px;
  background:#fff;font-size:11px;font-weight:500;
  color:#6B7280;cursor:pointer;
  transition:all .15s;white-space:nowrap;
  font-family:'Poppins',sans-serif;flex-shrink:0;
}
.tab-btn:hover{background:#F3F4F6;border-color:#D1D5DB;color:#333333}
.tab-btn.on{background:#78C043;border-color:#78C043;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(120,192,67,.3)}
.tab-bar-r{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── Hamburger button ── */
.mob-menu-btn{
  display:none;width:36px;height:36px;border-radius:var(--r);border:1.5px solid var(--bo);
  background:#fff;color:var(--i2);cursor:pointer;
  font-size:16px;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-overlay{display:none}

/* ═══ SICK / PEST ALERT RINGS ════════════════════════
   Visible directly in the greenhouse layout grid.
   Sick  = red-purple pulsing ring + ⚠ badge
   Pests = orange pulsing ring (stronger) + 🐛 badge
══════════════════════════════════════════════════════ */
@keyframes sick-pulse {
  0%,100%{ box-shadow: 0 0 0 2px #a855f7, 0 0 6px 3px rgba(168,85,247,.3); opacity:1; }
  40%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
  50%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
  60%{     box-shadow: 0 0 0 4px #9333ea, 0 0 16px 6px rgba(147,51,234,.7); opacity:.85; }
}
@keyframes pest-pulse {
  0%,100%{ box-shadow: 0 0 0 2.5px #f97316, 0 0 8px 4px rgba(249,115,22,.3); opacity:1; }
  35%{     box-shadow: 0 0 0 5px #ea580c,  0 0 18px 7px rgba(234,88,12,.75); opacity:.8; }
  50%{     box-shadow: 0 0 0 5px #ea580c,  0 0 18px 7px rgba(234,88,12,.75); opacity:.8; }
  65%{     box-shadow: 0 0 0 5px #ea580c,  0 0 18px 7px rgba(234,88,12,.75); opacity:.8; }
}
.pcw.alert-sick {
  border-radius: 8px;
  animation: sick-pulse 2s ease-in-out infinite;
  background: rgba(168,85,247,.07) !important;
}
.pcw.alert-pest {
  border-radius: 8px;
  animation: pest-pulse 1.6s ease-in-out infinite;
  background: rgba(249,115,22,.08) !important;
}
/* Alert badge — top right corner of the pot cell */
.pot-alert-badge {
  position: absolute;
  top: -4px; right: -4px;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; line-height: 1;
  border: 1.5px solid #fff;
  z-index: 25; pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.pot-alert-badge.sick-badge  { background: #9333ea; color: #fff; }
.pot-alert-badge.pest-badge  { background: #ea580c; color: #fff; }

/* Autocomplete input — touch + mouse compatible */
function Autocomplete({ value, onChange, onKeyDown, suggestions, placeholder, className, inputRef, big, onDeleteSuggestion }) {
    const [open, setOpen] = React.useState(false);
    const [hi, setHi] = React.useState(-1);
    const wrap = React.useRef();
    const [dropRect, setDropRect] = React.useState(null);

    const filtered = React.useMemo(() => {
        const lv = (value||'').toLowerCase();
        if (!lv) return suggestions.slice(0, 10);
        return suggestions.filter(s => s.toLowerCase().includes(lv)).slice(0, 10);
    }, [value, suggestions]);

    React.useEffect(() => { setHi(-1); }, [filtered.length]);

    // Close on outside click
    React.useEffect(() => {
        const fn = e => {
            if (wrap.current && !wrap.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', fn);
        document.addEventListener('touchstart', fn, { passive: true });
        return () => { document.removeEventListener('mousedown', fn); document.removeEventListener('touchstart', fn); };
    }, []);

    const updateRect = () => {
        if (wrap.current) {
            const r = wrap.current.getBoundingClientRect();
            // Use visualViewport for accurate positioning when keyboard is open on iOS
            const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
            const vOffset = window.visualViewport ? window.visualViewport.offsetTop : 0;
            const spaceBelow = vh - (r.bottom - vOffset);
            const top = spaceBelow < 180 ? (r.top - vOffset - 180) : (r.bottom - vOffset + 2);
            setDropRect({ top, left: r.left, width: r.width });
        }
    };

    const pick = v => { onChange(v); setOpen(false); setHi(-1); };

    const hKey = e => {
        if (!open || !filtered.length) { if (onKeyDown) onKeyDown(e); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); setHi(h => Math.min(h + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setHi(h => Math.max(h - 1, -1)); }
        else if (e.key === 'Enter' && hi >= 0) { e.preventDefault(); pick(filtered[hi]); }
        else if (e.key === 'Escape') { setOpen(false); }
        else if (onKeyDown) { onKeyDown(e); }
    };

    // Portal dropdown rendered directly on body to escape any stacking context
    const dropdown = open && filtered.length > 0 && dropRect
        ? ReactDOM.createPortal(
            React.createElement('div', {
                className: 'ac-drop',
                style: { position:'fixed', top: dropRect.top, left: dropRect.left, width: dropRect.width, zIndex: 99999 }
            }, filtered.map((item, i) => React.createElement('div', {
                key: item,
                className: 'ac-item' + (hi === i ? ' hi' : ''),
                style: { display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }
            },
                React.createElement('span', {
                    style: { flex:1 },
                    onMouseDown: e => { e.preventDefault(); pick(item); },
                    onTouchEnd: e => { e.preventDefault(); pick(item); }
                }, item),
                onDeleteSuggestion && React.createElement('span', {
                    title: 'Delete',
                    style: { color:'#ef4444', fontSize:13, lineHeight:1, padding:'2px 4px', cursor:'pointer', flexShrink:0 },
                    onMouseDown: e => { e.preventDefault(); e.stopPropagation(); onDeleteSuggestion(item); setOpen(false); },
                    onTouchEnd: e => { e.preventDefault(); e.stopPropagation(); onDeleteSuggestion(item); setOpen(false); }
                }, '×')
            ))),
            document.body
        )
        : null;

    return React.createElement('div', { className: 'ac-wrap', ref: wrap },
        React.createElement('input', {
            ref: inputRef,
            className: className || (big ? 'fi big' : 'fi'),
            value: value,
            onChange: e => { onChange(e.target.value); setOpen(true); updateRect(); },
            onFocus: () => { updateRect(); setOpen(true); },
            onKeyDown: hKey,
            placeholder: placeholder || '',
            autoComplete: 'off'
        }),
        dropdown
    );
}

function NoteBody({ text }) {
    var isRTL = /[\u0590-\u05FF\u0600-\u06FF\uFB1D-\uFB4F]/.test(text || '');
    // Render lines, highlighting timestamp badges
    function renderLines(raw) {
        if (!raw) return null;
        return raw.split('\n').map(function(line, i) {
            var m = line.match(/^(\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}\]\s?-?\s?)(.*)/);
            if (m) {
                return React.createElement('div', { key:i, style:{display:'flex',gap:6,alignItems:'baseline',minHeight:'1.4em'} },
                    React.createElement('span', { style:{fontSize:9,fontWeight:700,color:'var(--fo3)',fontFamily:'Inter,monospace',
                        flexShrink:0,background:'var(--ll)',border:'1px solid var(--ld)',borderRadius:4,padding:'1px 4px',whiteSpace:'nowrap'} },
                        m[1].trim()),
                    React.createElement('span', { style:{color:'var(--i2)'} }, m[2])
                );
            }
            return React.createElement('div', { key:i, style:{minHeight:'1.4em'} }, line || '\u00A0');
        });
    }
    return React.createElement('div', { className: 'note-body-wrap ' + (isRTL ? 'rtl' : 'ltr') },
        React.createElement('div', { className: 'note-body',
            style: { direction: isRTL ? 'rtl' : 'ltr', textAlign: isRTL ? 'right' : 'left', fontSize:12, lineHeight:1.6 }
        }, renderLines(text))
    );
}

function SpaceDonut({ used, total, size = 170 }) {
    const free = Math.max(0, total - used);
    const pctUsed = total > 0 ? used / total : 0;
    const pctFree = 1 - pctUsed;
    const freeSqM = (free / 10000).toFixed(1);
    const cx = size / 2, cy = size / 2;
    // Concentric rings helper
    const mkRing = (r, pct, color, sw) => {
        const circ = 2 * Math.PI * r;
        const dash = Math.max(0, pct) * circ;
        const gap  = circ - dash;
        return React.createElement("circle", {
            cx, cy, r, fill: "none", stroke: color, strokeWidth: sw,
            strokeDasharray: dash + " " + gap,
            strokeDashoffset: circ / 4,
            strokeLinecap: "round"
        });
    };
    const rings = [
        { r: 62, pct: pctUsed,  color: '#78C043', sw: 11 },
        { r: 47, pct: Math.min(pctUsed * 1.15, 1), color: '#FFB74D', sw: 11 },
        { r: 32, pct: pctFree,  color: '#FF8A65', sw: 11 },
    ];
    return React.createElement("div", { className: "donut-wrap", style: { width: size, height: size } },
        React.createElement("svg", { width: size, height: size, viewBox: "0 0 " + size + " " + size },

            rings.map((rg, i) => mkRing(rg.r, rg.pct, rg.color, rg.sw))

function upsertGenotypeDesc(data, name, description) {
    if (!name) return data;
    var existing = (data.genotypes || []);
    var idx = existing.findIndex(function(g){ return g.name === name; });
    var updated;
    if (idx >= 0) {
        updated = existing.map(function(g, i){ return i === idx ? Object.assign({}, g, { description: description, updated_at: new Date().toISOString() }) : g; });
    } else {
        updated = existing.concat([{ id: uid(), name: name, shortcut: '', description: description, updated_at: new Date().toISOString() }]);
    }
    return Object.assign({}, data, { genotypes: updated });

// ── Local-First Merge ─────────────────────────────────────────────────────
// Merges server state with local state, preserving local-only objects
// (those not yet confirmed by the server) so polls never ghost-delete them.
var MERGE_ARRAYS = ['tables','plants','notes','orders','messages','schedules','structs','genotypes','measures','tasks'];

function mergeRemoteData(remote, localData) {
    if (!localData) return remote;
    var merged = Object.assign({}, remote);
    MERGE_ARRAYS.forEach(function(key) {
        var remoteArr = remote[key] || [];
        var localArr  = localData[key] || [];
        // Index both sides by id
        var remoteById = {};
        remoteArr.forEach(function(item){ if(item && item.id) remoteById[item.id] = item; });
        var localById = {};
        localArr.forEach(function(item){ if(item && item.id) localById[item.id] = item; });
        // Collect all IDs from both sides
        var allIds = {};
        remoteArr.forEach(function(item){ if(item && item.id) allIds[item.id] = true; });
        localArr.forEach(function(item){ if(item && item.id) allIds[item.id] = true; });
        var result = [];
        Object.keys(allIds).forEach(function(id) {
            var r = remoteById[id];
            var l = localById[id];
            if (r && l) {
                // Both sides have it — LWW per-object using updated_at
                var rt = r.updated_at || r._lww_ts || 0;
                var lt = l.updated_at || l._lww_ts || 0;
                // Keep local if dirty (_localOnly) or newer
                if (l._localOnly || lt > rt) {
                    result.push(l);
                } else {
                    result.push(r);
                }
            } else if (r) {
                result.push(r); // only on server
            } else if (l) {
                // Only local — keep if _localOnly or server simply doesn't have it yet
                result.push(l);
            }
        });
        merged[key] = result;
    });
    if (localData._lww_ts && (!remote._lww_ts || localData._lww_ts > remote._lww_ts)) {
        merged._lww_ts = localData._lww_ts;
    }
    return merged;
}

// ── Pull-to-Refresh wrapper ───────────────────────────────────────────────
function PullToRefresh({ onRefresh, children, style, className }) {
    var THRESHOLD    = 72;  // px of pull needed to trigger refresh
    var MAX_PULL     = 100; // max visual travel
    var [pullY, setPullY]     = React.useState(0);
    var [phase, setPhase]     = React.useState('idle'); // idle|pulling|ready|refreshing
    var startYRef  = React.useRef(0);
    var isPullingRef = React.useRef(false);
    var containerRef = React.useRef(null);

    var onTouchStart = function(e) {
        var el = containerRef.current;
        if (!el) return;
        var scrollTop = el.scrollTop;
        // Only activate PTR when already scrolled to the very top
        if (scrollTop > 2) return;
        startYRef.current = e.touches[0].clientY;
        isPullingRef.current = true;
    };

    var onTouchMove = function(e) {
        if (!isPullingRef.current) return;
        var el = containerRef.current;
        if (!el || el.scrollTop > 2) { isPullingRef.current = false; return; }
        var dy = e.touches[0].clientY - startYRef.current;
        if (dy <= 0) { isPullingRef.current = false; setPullY(0); setPhase('idle'); return; }
        // Prevent native scroll while we're pulling
        e.preventDefault();
        var travel = Math.min(dy * 0.5, MAX_PULL); // rubber-band damping
        setPullY(travel);
        setPhase(travel >= THRESHOLD ? 'ready' : 'pulling');
    };

    var onTouchEnd = function() {
        if (!isPullingRef.current) return;
        isPullingRef.current = false;
        if (phase === 'ready') {
            setPhase('refreshing');
            setPullY(THRESHOLD); // hold at threshold height while refreshing
            Promise.resolve(onRefresh()).then(function() {
                setPhase('idle');
                setPullY(0);
            }).catch(function() {
                setPhase('idle');
                setPullY(0);
            });
        } else {
            setPhase('idle');
            setPullY(0);
        }
    };

    var indicatorStyle = {
        position: 'absolute',
        top: 0, left: 0, right: 0,
        height: pullY,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        overflow: 'hidden',
        transition: phase === 'idle' ? 'height .25s ease' : 'none',
        background: 'linear-gradient(180deg, #f0fdf4 0%, transparent 100%)',
        zIndex: 20,
        pointerEvents: 'none',
        fontSize: 11,
        fontWeight: 600,
        color: '#78C043',
        gap: 6,
        fontFamily: 'Poppins,sans-serif'
    };

    var spinStyle = {
        display: 'inline-block',
        fontSize: 18,
        animation: phase === 'refreshing' ? 'spin-ptr 0.8s linear infinite' : 'none',
        transform: phase !== 'refreshing' ? 'rotate(' + Math.min(pullY / THRESHOLD * 360, 360) + 'deg)' : undefined,
        transition: phase === 'refreshing' ? 'none' : 'transform .1s'
    };

    return React.createElement('div', {
        ref: containerRef,
        className: className,
        style: Object.assign({ position: 'relative', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }, style),
        onTouchStart: onTouchStart,
        onTouchMove: onTouchMove,
        onTouchEnd: onTouchEnd
    },
        (pullY > 0 || phase === 'refreshing') && React.createElement('div', { style: indicatorStyle },
            React.createElement('span', { style: spinStyle }, '↻'),
            phase === 'ready'       ? 'Release to refresh' :
            phase === 'refreshing'  ? 'Refreshing…' : 'Pull to refresh'
        ),
        children
    );
}

// ── Nuclear sync: clear all caches, kill SW, hard reload ─────────────────
function nuclearSync() {
    dbgLog('[Nuclear] Starting nuclear sync...');
    var ts = Date.now();
    // 1. Clear localStorage (preserves nothing — full reset)
    try { localStorage.clear(); dbgLog('[Nuclear] localStorage cleared'); } catch(e) { dbgErr('[Nuclear] localStorage clear failed: ' + e.message); }
    // 2. Clear sessionStorage
    try { sessionStorage.clear(); dbgLog('[Nuclear] sessionStorage cleared'); } catch(e) {}
    // 3. Clear IDB greenlab database
    try {
        var req = indexedDB.deleteDatabase('greenlab_v1');
        req.onsuccess = function(){ dbgLog('[Nuclear] IDB deleted'); };
        req.onerror   = function(){ dbgErr('[Nuclear] IDB delete failed'); };
    } catch(e) { dbgErr('[Nuclear] IDB delete error: ' + e.message); }
    // 4. Unregister all service workers
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
            dbgLog('[Nuclear] SW registrations found: ' + regs.length);
            return Promise.all(regs.map(function(r){ return r.unregister(); }));
        }).then(function() {
            dbgLog('[Nuclear] All SWs unregistered — reloading...');
            doReload(ts);
        }).catch(function(e) {
            dbgErr('[Nuclear] SW unregister error: ' + e.message);
            doReload(ts);
        });
    } else {
        doReload(ts);
    }
    function doReload(ts) {
        // ?nocache= param makes the URL unique so the browser can't serve from cache
        var url = window.location.pathname + '?nocache=' + ts;
        window.location.replace(url);
    }
}
window._nuclearSync = nuclearSync;

// ── Genotype Autocomplete — supports shortcuts + long names ──────────────
function GenotypeAutocomplete({ value, onChange, suggestions, genotypes, inputRef, onKeyDown, onDeleteSuggestion }) {
    var [open, setOpen] = React.useState(false);
    var [hi, setHi]     = React.useState(-1);
    var inputEl = React.useRef();
    var pickingRef = React.useRef(false);
    // dropPos: calculated fresh each render when open
    var [dropPos, setDropPos] = React.useState(null);

    var filtered = React.useMemo(function() {
        var lv = (value || '').toLowerCase();
        if (!lv) return suggestions.slice(0, 12);
        return suggestions.filter(function(s) {
            return s.label.toLowerCase().includes(lv) ||
                   (s.shortcut && s.shortcut.toLowerCase().includes(lv));
        }).slice(0, 12);
    }, [value, suggestions]);

    React.useEffect(function(){ setHi(-1); }, [filtered.length]);

    // Recalculate dropdown position whenever it opens or value changes
    React.useLayoutEffect(function() {
        if (!open || !inputEl.current) return;
        var r = inputEl.current.getBoundingClientRect();
        var vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        var vOff = window.visualViewport ? window.visualViewport.offsetTop : 0;
        var spaceBelow = vh - (r.bottom - vOff);
        var dropH = Math.min(filtered.length * 52 + 8, 220);
        var top = spaceBelow < dropH + 8 ? (r.top - vOff - dropH - 4) : (r.bottom - vOff + 2);
        setDropPos({ top: top, left: r.left, width: Math.max(r.width, 260) });
    }, [open, filtered.length]);

    // Close on outside tap/click
    React.useEffect(function() {
        if (!open) return;
        var fn = function(e) {
            if (inputEl.current && !inputEl.current.closest('.ac-wrap').contains(e.target) &&
                !e.target.closest('.ac-drop-geno')) {
                setOpen(false);
            }
        };
        // Use capture so we see the event before anything else
        document.addEventListener('mousedown', fn, true);
        document.addEventListener('touchstart', fn, { passive: true, capture: true });
        return function() {
            document.removeEventListener('mousedown', fn, true);
            document.removeEventListener('touchstart', fn, { capture: true });
        };
    }, [open]);

    function pick(item) {
        pickingRef.current = true;
        onChange(item.label);
        setOpen(false);
        setHi(-1);
        setTimeout(function(){ pickingRef.current = false; }, 400);
    }

    function hKey(e) {
        if (!open || !filtered.length) { if (onKeyDown) onKeyDown(e); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); setHi(function(h){ return Math.min(h+1, filtered.length-1); }); }
        else if (e.key === 'ArrowUp')  { e.preventDefault(); setHi(function(h){ return Math.max(h-1, -1); }); }
        else if (e.key === 'Enter' && hi >= 0) { e.preventDefault(); pick(filtered[hi]); }
        else if (e.key === 'Escape') { setOpen(false); }
        else if (e.key === 'Tab' && hi >= 0) { e.preventDefault(); pick(filtered[hi]); }
        else if ((e.key === 'Enter' || e.key === 'Tab') && hi < 0) {
            var lc = (value || '').toLowerCase();
            var sc = (genotypes||[]).find(function(g){ return g.shortcut && g.shortcut.toLowerCase() === lc; });
            if (sc && sc.name !== value) { e.preventDefault(); onChange(sc.name); setOpen(false); return; }
            if (onKeyDown) onKeyDown(e);
        }
        else if (onKeyDown) { onKeyDown(e); }
    }

    var dropdown = open && filtered.length > 0 && dropPos
        ? ReactDOM.createPortal(
            React.createElement('div', { className: 'ac-drop ac-drop-geno',
                style:{ position:'fixed', top:dropPos.top, left:dropPos.left, width:dropPos.width,
                        zIndex:999999, maxHeight:220, overflowY:'auto',
                        background:'#fff', border:'1.5px solid var(--bo)',
                        borderRadius:'var(--r2)', boxShadow:'var(--sh2)' }
            },
            filtered.map(function(item, i) {
                var shortcutMatch = item.shortcut && (value||'').toLowerCase() && item.shortcut.toLowerCase().includes((value||'').toLowerCase());
                return React.createElement('div', { key:item.label,
                    className: 'ac-item' + (hi===i?' hi':''),
                    style:{ display:'flex', alignItems:'center', gap:8, padding:'10px 12px', cursor:'pointer',
                            minHeight:44, boxSizing:'border-box' },
                    onMouseDown: function(e){ e.preventDefault(); pick(item); },
                    onTouchStart: function(e){ e.stopPropagation(); },
                    onTouchEnd: function(e){ e.preventDefault(); e.stopPropagation(); pick(item); }
                },
                    React.createElement('div', { style:{flex:1,minWidth:0} },
                        React.createElement('div', { style:{fontWeight:600,fontSize:13,color:'var(--i1)',
                            wordBreak:'break-all',fontFamily:'Inter,monospace'} }, item.label),
                        (item.shortcut || item.desc) && React.createElement('div', {
                            style:{fontSize:11,color:'var(--i4)',marginTop:2,display:'flex',gap:6,flexWrap:'wrap'}},
                            item.shortcut && React.createElement('span', {
                                style:{background: shortcutMatch?'#dbeafe':'#f1f5f9',
                                       color: shortcutMatch?'#1d4ed8':'var(--i4)',
                                       borderRadius:3,padding:'1px 5px',fontFamily:'monospace',fontWeight:700}
                            }, item.shortcut),
                            item.desc && React.createElement('span', {
                                style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:180}
                            }, item.desc)
                        )
                    ),
                    onDeleteSuggestion && React.createElement('span', {
                        style:{ color:'#ef4444', fontSize:16, padding:'4px 8px', cursor:'pointer', flexShrink:0 },
                        onMouseDown: function(e){ e.preventDefault(); e.stopPropagation(); onDeleteSuggestion(item.label); setOpen(false); },
                        onTouchEnd: function(e){ e.preventDefault(); e.stopPropagation(); onDeleteSuggestion(item.label); setOpen(false); }
                    }, '×')
                );
            })), document.body)
        : null;

    return React.createElement('div', { className:'ac-wrap', style:{position:'relative'} },
        React.createElement('input', {
            ref: function(el){ inputEl.current = el; if (inputRef) { if (typeof inputRef === 'function') inputRef(el); else inputRef.current = el; } },
            className: 'fi big',
            value: value,
            onChange: function(e){ onChange(e.target.value); setOpen(true); },
            onFocus: function(){ setOpen(true); },
            onBlur: function() {
                setTimeout(function() {
                    if (pickingRef.current || !value) return;
                    var lc = value.toLowerCase();
                    var sc = (genotypes||[]).find(function(g){ return g.shortcut && g.shortcut.toLowerCase() === lc; });
                    if (sc && sc.name !== value) { onChange(sc.name); return; }
                    var partials = (genotypes||[]).filter(function(g){ return g.shortcut && g.shortcut.toLowerCase().startsWith(lc); });
                    if (partials.length === 1 && partials[0].name !== value) { onChange(partials[0].name); }
                }, 400);
            },
            onKeyDown: hKey,
            placeholder: 'Full name or shortcut (e.g. ckx → pFIL>>CKX3)',
            autoComplete: 'off',
            style:{
                fontFamily:'Inter,monospace',
                fontSize: value && value.length > 20 ? 11 : 13,
                height: 'auto',
                minHeight: 34,
                whiteSpace: 'normal',
                wordBreak: 'break-all',
                overflowWrap: 'break-word'
            }
        }),
        dropdown
    );
}

// ── Multi-experiment helpers ──────────────────────────────────────────────
function getExpIds(plant) {
    // Support both legacy experiment_id (string) and new experiment_ids (array)
    if (Array.isArray(plant.experiment_ids)) return plant.experiment_ids;
    if (plant.experiment_id) return [plant.experiment_id];
    return [];
}
function hasExp(plant, eid) { return getExpIds(plant).includes(eid); }
function addExp(plant, eid) {
    var ids = getExpIds(plant);
    if (ids.includes(eid)) return plant;
    return Object.assign({}, plant, { experiment_ids: ids.concat([eid]), experiment_id: ids.concat([eid])[0] });
}
function removeExp(plant, eid) {
    var ids = getExpIds(plant).filter(function(id){ return id !== eid; });
    return Object.assign({}, plant, { experiment_ids: ids, experiment_id: ids[0] || null });
}

// QR rendered into a container div using QRCode.js
function QRCanvas({ value, size }) {
    var ref = React.useRef();
    React.useEffect(function() {
        var el = ref.current;
        if (!el || !value) return;
        el.innerHTML = '';
        if (typeof QRCode === 'undefined') return;
        new QRCode(el, { text: value, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
    }, [value, size]);
    return React.createElement('div', { ref: ref, style:{display:'inline-block'} });
}

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
}
if (window._fbReady) {
  mountApp();
} else {
  // Poll until the dynamic Firebase loader sets _fbReady
  var _fbWait = setInterval(function() {
    if (window._fbReady) {
      clearInterval(_fbWait);
      mountApp();
    }
  }, 20);
  // Safety timeout: mount after 4s regardless
  setTimeout(function() {
    clearInterval(_fbWait);
    mountApp();
  }, 4000);
}


</script>
</body>
</html>
